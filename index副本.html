<script>
var SK='zm&#95;v1';
var S={profiles:[{name:'默认',base&#95;url:'https://api.openai.com/v1',api&#95;key:'',model:'gpt-4o',models:[],&#95;temperature:true,temperature:0.7,use&#95;max&#95;tokens:false,max&#95;tokens:2048,use&#95;top&#95;p:false,top&#95;p:1,use&#95;frequency&#95;penalty:false,frequency&#95;penalty:0}],activeProfileIdx:0,chats:{},currentChatId:null,knowledge:[],archive:{}};
var stm=false,abC=null,pendFiles=[],ctxMode=false,editIdx=null;
var MAX&#95;FILE&#95;SIZE=50&#42;1024&#42;1024;

try{var sv=localStorage.getItem(SK);if(sv){var d=JSON.parse(sv);Object.assign(S,d)}}catch(e){console.error('load failed:',e)}
if(!S.chats||typeof S.chats!=='object')S.chats={};
if(!S.profiles||!S.profiles.length)S.profiles=[{name:'默认',base&#95;url:'https://api.openai.com/v1',api&#95;key:'',model:'gpt-4o',models:[],use&#95;temperature:true,temperature:0.7,use&#95;max&#95;tokens:false,max&#95;tokens:2048,use&#95;top&#95;p:false,top&#95;p:1,use&#95;frequency&#95;penalty:false,frequency&#95;penalty:0}];

function save(){try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){if(e.name==='QuotaExceededError'||e.code===22)toast('⚠️ 存储已满！请导出快照并清理旧对话','er');else console.error('save failed:',e)}}
function esc(t){if(t==null)return'';return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/';')}
function gId(){return'c&#95;'+Date.now()+'&#95;'+Math.random().toString(36).slice(2,8)}
function toast(m,t){var e=document.createElement('div');e.className='tst '+(t||'ok');e.textContent=m;document.body.appendChild(e);setTimeout(function(){e.remove()},2600)}
function clM(id){document.getElementById(id).classList.remove('show')}

function tgSb(){document.getElementById('sb').classList.toggle('show');document.getElementById('ov').classList.toggle('show')}

document.addEventListener('click',function(e){if(!e.target.closest('.att-btn')&&!e.target.closest('.att-pan'))document.getElementById('attPan').classList.remove('show')});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){var mos=document.querySelectorAll('.mo.show');for(var i=0;i<mos.length;i++)mos[i].classList.remove('show')}});

function rMD(t){
    if(!t)return'';
    try{
        if(typeof marked==='undefined')return'<p style="white-space:pre-wrap;margin:0">'+esc(t)+'</p>';
        marked.setOptions({breaks:true,gfm:true});
        var html=marked.parse(t);
        if(typeof DOMPurify!=='undefined')html=DOMPurify.sanitize(html);
        var plainOut=html.replace(/<[^>]+>/g,'').trim();
        var plainIn=t.replace(/```[\s\S]&#42;?```/g,'').replace(/`[^`]&#42;`/g,'').replace(/[#&#42;&#95;>\-|]/g,'').trim();
        if(plainIn.length>20&&plainOut.length<plainIn.length&#42;0.5)return'<p style="white-space:pre-wrap;margin:0">'+esc(t)+'</p>';
        return html;
    }catch(e){console.error('md render:',e);return'<p style="white-space:pre-wrap;margin:0">'+esc(t)+'</p>'}
}

function apiF(path,opts){
    opts=opts||{};
    var p=S.profiles[S.activeProfileIdx]||S.profiles[0];
    if!p.api&#95;key)thro Key 未配置');
    var h=new Headers(opts.headers||{});
    if(!h.has('Authorization'))h.set('Authorization','Bearer '+p.api&#95;key);
    if(!h.has('Content-Type')&&opts.body)h.set('Content-Type','application/json');
    if(p.base&#95;url)h.set('X-Target-Base',p.base&#95;url);
    var o={};for(var k in opts)o[k]=opts[k];o.headers=h;
    return fetch('/api/'+path,o)
}

function newChat(r){
    if(r===undefined)r=true;

    S.chats[id]={id:id,title:'新对&#95;prompt:'',session&#95;knowledge:[],session&#95;files:[],created:Date.now()};
    S.currentChatId=id;
    save();
    if(r)render()

    S.currentChatId=id;
    pendFiles=[];ctxMode=false;
    save();render();
    if(window.innerWidth<=768){document.getElementById('sb').classList.remove('show');document.getElementById('ov').classList.remove('show')}
}

function delC(id){
    if(!confirm('确认删除此对话？'))return;
    delete S.chats[id];
    if(S.currentChatId===id){var ks=Object.keys(S.chats);S.currentChatId=ks.length?ks[0]:null;if(!S.currentChatId)newChat(false)}
    save();render()
}

function arcC(id){
    if(!S.chats[id])return;
    S.archive[id]=S.chats[id];
    delete S.chats[id];
    if(S.currentChatId===id){var ks=Object.keys(S.chats);S.currentChatId=ks.length?ks[0]:null;if(!S.currentChatId)newChat(false)}
    save();render();toast('已归档','ok')
}

function unarc(id){
    if(!S.archive[id])return.chats[id]=S.archive[id];
    delete S.archive[id];
    save();renderArc();renderSB();toast('已恢复','ok')
}

function delArc(id){
    if(!confirm('永久删除此归档？'))return;
    delete S.archive[id];
    save();renderArc()
}

    var c=S.chats[S.currentChatId];
    if(c&&v.trim()){c.title=v.trim();save();renderSB()}

function renderSB(){
    var q=(document.getElementById('schIn')&&document.getElementById('schIn').value||'').toLowerCase();
    =document.getElementById('chatList');
    var ids=Object.keys(S.chats).sort(function(a,b){return(S.chats[b].created||0)-(S.chats[a].created||0)});
    var html='';
    for(var i=0;i<ids.length;i++){
        var id=ids[i],c=S.chats[id];
        if(q&&c.title.toLowerCase().indexOf(q)<0)continue;
        html+='<div class="ci'+(id===S.currentChatId?' act':'')+'" onclick="swC(\''+esc(id)+'\')"><div class="ci-t">'+esc(c.title)+'</div><div class="ci-a"><button onclick="event.stopPropagation();arcC(\''+esc(id)+'\')" title="归档">🗄️</button><button onclick="event.stopPropagation();delC(\''+esc(id)+'\')" title="删除">🗑️</button></div></div>';
    }
    list.innerHTML=html||'<div style="padding:20px;color:var(--tx2);text-align:center;font-size:13px">无对话</div>'
}

function renderMH(){
    var c=S.chats[S.currentChatId];
    if(!c)return;
    document.getElementById('titleIn').value=c.title||'';
    var sel=document.getElementById('mdlSel');
    var p=S.profiles[S.activeProfileIdx];
    var mdls=(p&&p.models&&p.models.length)?p.models:[p?p.model:'gpt-4o'];

async function parseF(f){
    if(f.size>MAX&#95;FILE&#95;SIZE)throw new Error('文件过>50MB）');
    var n=f.name.toLowerCase();
    if(n.endsWith('.pdf')){
        if(typeof pdfjsLib==='undefined')throw new Error('PDF 库未加载');
        pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        var ab=await f.arrayBuffer();
        var pdf=await pdfjsLib.getDocument({data:ab}).promise;
        var txt='';
        for(var p=1;p<=pdf.numPages;p++){var pg=await pdf.getPage(p);var c=await pg.getTextContent();txt+=c.items.map(function(it){return it.str}).join(' ')+'\n'}
        return txt;
    }
    if(n.endsWith('.docx')){
        if(typeof mammoth==='undefined')throw new Error('Mammoth 库未加载');
        var ab2=await f.arrayBuffer();
        var res=await mammoth.extractRawText({arrayBuffer:ab2});
        return res.value;
    }
    return await f.text();
}

function iSnap(){
    var inp=document.createElement('input');
    inp.type='file';inp.accept='.json';
    inp.onchange=function(e){
        var f=e.target.files[0];
        if(!f)return;
        var r=new FileReader();
        r.onload=function(ev){
            try{
                var d=JSON.parse(ev.target.result);
                if(!confirm('导入将前所有数据，确认？'))return;
                if(Array.isArray(d.profiles))S.profiles=d.profiles;
                if(d.chats&&typeof d.chats==='object'&&!Array.isArray(d.chats))S.chats=d.chats;
                if(Array.isArray(d.knowledge))S.knowledge=d.knowledge;
                if(d.archive&&typeof d.archive==='object'&&!Array.isArray(d.archive))S.archive=d.archive;
                if(typeof d.activeProfileIdx==='number')S.activeProfileIdx=d.activeProfileIdx;
                if(typeof d.currentChatId==='string')S.currentChatId=d.currentChatId;
                if(!S.currentChatId||!S.chats[S.currentChatId]){varks=Object.keys(S.chats);S.currentChatId=ks.length?ks[0]:null;if(!S.currentChatId)newChat(false)}
                save();render();toast('导入成功','ok')
            }catch(err){toast('导入失败: '+err.message,'er');console.error(err)}
        };
        r.readAsText(f)
    };
    inp.click()
}
