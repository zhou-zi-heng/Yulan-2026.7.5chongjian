<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ZenMux 创作者工作站</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" id="hlTheme">
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists@2.1.1/dist/markdown-it-task-lists.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote@4.0.0/dist/markdown-it-footnote.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-mark@4.0.0/dist/markdown-it-mark.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-sub@2.0.0/dist/markdown-it-sub.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-sup@2.0.0/dist/markdown-it-sup.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-ins@4.0.0/dist/markdown-it-ins.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-abbr@2.0.0/dist/markdown-it-abbr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-deflist@3.0.0/dist/markdown-it-deflist.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-container@4.0.0/dist/markdown-it-container.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-attrs@4.2.0/markdown-it-attrs.browser.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<style>
:root{
  --bg:#f5f6f8;--card:#fff;--border:#e5e7eb;--text:#1f2937;--text2:#6b7280;
  --brand:#10a37f;--brand-h:#0d8a6a;--user-bg:#10a37f;--ai-bg:#f7f7f8;
  --code-bg:#1e1e1e;--shadow:0 1px 3px rgba(0,0,0,.08);--ok:#10b981;--er:#ef4444;--wa:#f59e0b;
  --foc:#10a37f;
}
[data-theme="dark"]{
  --bg:#0f1419;--card:#1a1f26;--border:#2d3748;--text:#e5e7eb;--text2:#9ca3af;
  --ai-bg:#1a1f26;--code-bg:#0d1117;--shadow:0 1px 3px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
:focus-visible{outline:2px solid var(--foc);outline-offset:2px;border-radius:4px}
button:focus:not(:focus-visible){outline:none}
.app{display:flex;height:100vh;height:100dvh}
.sb{width:260px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:.3s;flex-shrink:0}
.sb.hid{margin-left:-260px}
.sbh{padding:12px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center}
.logo{font-weight:700;font-size:15px;color:var(--brand);flex:1}
.ibtn{background:transparent;border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.2s}
.ibtn:hover{background:var(--bg)}
.ibtn.pri{background:var(--brand);color:#fff;border-color:var(--brand)}
.ibtn.pri:hover{background:var(--brand-h)}
.srch{padding:8px 12px;border-bottom:1px solid var(--border)}
.srch input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px}
.srch-mode{display:flex;gap:4px;margin-top:6px}
.srch-mode button{flex:1;padding:3px;font-size:11px;border:1px solid var(--border);background:var(--bg);color:var(--text2);border-radius:4px;cursor:pointer}
.srch-mode button.act{background:var(--brand);color:#fff;border-color:var(--brand)}
.chats{flex:1;overflow-y:auto;padding:8px}
.chat-item{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;margin-bottom:2px;display:flex;align-items:center;gap:6px;group:hover}
.chat-item:hover{background:var(--bg)}
.chat-item.act{background:var(--bg);font-weight:500}
.chat-item .ti{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-item .del{opacity:0;background:transparent;border:none;color:var(--text2);cursor:pointer;padding:2px 4px;font-size:12px}
.chat-item:hover .del{opacity:1}
.chat-item .del:hover{color:var(--er)}
.chat-item .pin{font-size:10px;color:var(--wa)}
.sbf{padding:10px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}
.sbf button{flex:1;min-width:70px;padding:6px;font-size:11px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:6px;cursor:pointer}
.sbf button:hover{background:var(--card)}
.storage-bar{padding:6px 10px;border-top:1px solid var(--border);font-size:10px;color:var(--text2)}
.storage-bar .bar{height:3px;background:var(--bg);border-radius:2px;margin-top:3px;overflow:hidden}
.storage-bar .fill{height:100%;background:var(--brand);transition:.3s}
.storage-bar .fill.wa{background:var(--wa)}
.storage-bar .fill.er{background:var(--er)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.top{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.top select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;max-width:260px}
.top .title{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.token-bar{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}
.token-bar .bar{width:80px;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.token-bar .fill{height:100%;background:var(--brand);transition:.3s}
.token-bar .fill.wa{background:var(--wa)}
.token-bar .fill.er{background:var(--er)}
.area{flex:1;overflow-y:auto;padding:20px 0}
.msgs{max-width:800px;margin:0 auto;padding:0 16px}
.msg{margin-bottom:20px;display:flex;gap:10px}
.msg.u{flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:#fff;font-weight:600}
.msg.u .av{background:var(--user-bg)}
.msg.a .av{background:#6b7280}
.bub-wrap{max-width:calc(100% - 50px);display:flex;flex-direction:column;gap:4px}
.msg.u .bub-wrap{align-items:flex-end}
.bub{padding:10px 14px;border-radius:10px;word-wrap:break-word;overflow-wrap:break-word}
.msg.u .bub{background:var(--user-bg);color:#fff;border-bottom-right-radius:3px}
.msg.a .bub{background:var(--ai-bg);border:1px solid var(--border);border-bottom-left-radius:3px}
.msg.a .bub.cmp{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px;background:transparent;border:none}
.msg.a .bub.cmp>div{padding:10px 14px;border-radius:8px;background:var(--ai-bg);border:1px solid var(--border);position:relative}
.msg.a .bub.cmp>div.sel{border-color:var(--brand);box-shadow:0 0 0 2px rgba(16,163,127,.2)}
.msg.a .bub.cmp>div .pick{position:absolute;top:4px;right:4px;font-size:10px;padding:2px 6px;background:var(--brand);color:#fff;border:none;border-radius:3px;cursor:pointer;opacity:0}
.msg.a .bub.cmp>div:hover .pick{opacity:1}
.meta{font-size:11px;color:var(--text2);display:flex;gap:8px;align-items:center;padding:0 4px}
.meta .actions{display:flex;gap:2px}
.meta button{background:transparent;border:none;color:var(--text2);cursor:pointer;padding:2px 5px;border-radius:3px;font-size:11px}
.meta button:hover{background:var(--bg);color:var(--text)}
.bub p{margin:6px 0}.bub p:first-child{margin-top:0}.bub p:last-child{margin-bottom:0}
.bub h1,.bub h2,.bub h3,.bub h4{margin:12px 0 6px;font-weight:600}
.bub h1{font-size:1.4em}.bub h2{font-size:1.25em}.bub h3{font-size:1.1em}
.bub ul,.bub ol{margin:6px 0;padding-left:22px}
.bub li{margin:3px 0}
.bub blockquote{border-left:3px solid var(--brand);padding:4px 10px;margin:8px 0;color:var(--text2);background:var(--bg);border-radius:0 4px 4px 0}
.bub table{border-collapse:collapse;margin:8px 0;width:100%;font-size:13px}
.bub th,.bub td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.bub th{background:var(--bg);font-weight:600}
.bub code:not(pre code){background:rgba(175,184,193,.2);padding:2px 5px;border-radius:3px;font-family:"SF Mono",Consolas,monospace;font-size:.88em}
.msg.u .bub code:not(pre code){background:rgba(255,255,255,.25)}
.bub a{color:var(--brand);text-decoration:none}
.bub a:hover{text-decoration:underline}
.msg.u .bub a{color:#fff;text-decoration:underline}
.code-wrap{position:relative;margin:8px 0;border-radius:6px;overflow:hidden;background:var(--code-bg)}
.code-hd{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:rgba(0,0,0,.3);color:#ccc;font-size:11px;font-family:"SF Mono",Consolas,monospace}
.code-hd button{background:transparent;border:1px solid #555;color:#ccc;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:10px;transition:.2s}
.code-hd button:hover{background:#555}
.code-wrap pre{margin:0;padding:12px;overflow-x:auto;color:#d4d4d4;font-size:13px;line-height:1.5}
.code-wrap code{font-family:"SF Mono",Consolas,monospace;background:transparent!important;padding:0!important}
.bub hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.mermaid{text-align:center;margin:10px 0;padding:10px;background:#fff;border-radius:6px;overflow-x:auto}
[data-theme="dark"] .mermaid{background:#f7f7f8}
.mermaid-err{color:var(--er);font-size:12px;padding:8px;background:rgba(239,68,68,.1);border-radius:4px;margin:8px 0}
.mermaid-err pre{margin-top:6px;padding:6px;background:var(--code-bg);color:#d4d4d4;border-radius:4px;font-size:11px}
.katex-display{overflow-x:auto;overflow-y:hidden;margin:8px 0}
.bub input[type=checkbox]{margin-right:6px}
.bub .md-container{border-left:4px solid;padding:8px 12px;margin:8px 0;border-radius:0 4px 4px 0;background:var(--bg)}
.bub .md-container.tip{border-color:var(--brand)}
.bub .md-container.warning{border-color:var(--wa)}
.bub .md-container.danger{border-color:var(--er)}
.bub .md-container.info{border-color:#3b82f6}
.bub .md-container-title{font-weight:600;margin-bottom:4px}
.bub img{max-width:100%;border-radius:6px;margin:6px 0}
.input-zone{border-top:1px solid var(--border);background:var(--card);padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom))}
.input-wrap{max-width:800px;margin:0 auto}
.att-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.att-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:12px;font-size:12px;cursor:pointer}
.att-badge:hover{border-color:var(--brand)}
.att-badge img{width:22px;height:22px;object-fit:cover;border-radius:3px}
.att-badge .rm{background:transparent;border:none;color:var(--text2);cursor:pointer;padding:0 2px;font-size:14px}
.att-badge .rm:hover{color:var(--er)}
.draft-tip{font-size:11px;color:var(--wa);margin-bottom:4px;display:none}
.draft-tip.show{display:block}
.ibox{display:flex;gap:8px;align-items:flex-end}
.ibox textarea{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:14px;resize:none;min-height:42px;max-height:200px;font-family:inherit;line-height:1.5}
.ibox textarea:focus{outline:none;border-color:var(--brand)}
.ibox button{padding:10px 16px;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;height:42px}
.sendb{background:var(--brand);color:#fff}
.sendb:hover{background:var(--brand-h)}
.sendb:disabled{opacity:.5;cursor:not-allowed}
.stopb{background:var(--er);color:#fff}
.tools{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center}
.tools button,.tools label{padding:4px 10px;font-size:12px;border:1px solid var(--border);background:var(--bg);color:var(--text2);border-radius:6px;cursor:pointer}
.tools button.act{background:var(--brand);color:#fff;border-color:var(--brand)}
.tools .hint{font-size:11px;color:var(--text2);margin-left:auto}
.mask{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.mask.sh{display:flex}
.dlg{background:var(--card);border-radius:10px;padding:20px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto}
.dlg h3{margin-bottom:12px;font-size:16px}
.dlg label{display:block;margin:8px 0 4px;font-size:12px;color:var(--text2)}
.dlg input,.dlg textarea,.dlg select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;font-family:inherit}
.dlg textarea{resize:vertical;min-height:60px}
.dlg .row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.dlg button{padding:7px 14px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:var(--bg);color:var(--text);font-size:13px}
.dlg button.pri{background:var(--brand);color:#fff;border-color:var(--brand)}
.dlg button.dan{background:var(--er);color:#fff;border-color:var(--er)}
.toast-wrap{position:fixed;top:16px;right:16px;z-index:200;displayction:column;gap:6px;max-width:calc(100vw - 32px)}
.toast{background:var(--card);border:1px solid var(--border);padding:10px 14px;border-radius:8px;box-shadow:var(--shadow);animation:in .3s;font-size:13px;display:flex;align-items:center;gap:8px;max-width:340px}
.toast.ok{border-left:3px solid var(--ok)}
.toast.er{border-left:3px solid var(--er)}
.toast.wa{border-left:3px solid var(--wa)}
@keyframes in{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty h2{font-size:22px;color:var(--text);margin-bottom:8px}
.empty p{font-size:13px}
.typing{display:inline-block;animation:bl 1s infinite}
@keyframes bl{0%,50%{opacity:1}51%,100%{opacity:0}}
.menu-btn{display:none}
@media(max-width:768px){
  .sb{position:fixed;z-index:50;height:100%}
  .sb.hid{margin-left:-260px}
  .menu-btn{display:flex}
  .top select{max-width:160px;font-size:12px}
  .msg.a .bub.cmp{grid-template-columns:1fr}
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text2)}
.att-preview{max-height:300px;overflow-y:auto;padding:10px;background:var(--bg);border-radius:6px;font-size:12px;white-space:pre-wrap;font-family:"SF Mono",monospace}
.share-link{padding:10px;background:var(--bg);border-radius:6px;font-size:12px;word-break:break-all;margin:8px 0;font-family:"SF Mono",monospace}
</style>
</head>
<body>
<div class="app">
  <aside class="sb" id="sb" aria-label="对话列表">
    <div class="sbh">
      <span class="logo">⚡ ZenMux</span>
      <button class="ibtn" id="themeBtn" aria-label="切换主题" title="切换主题">🌙</button>
      <button class="ibtn pri" id="newBtn" aria-label="新建对话" title="新建对话">+</button>
    </div>
    <div class="srch">
      <input type="search" id="srchIn" placeholder="搜索..." aria-label="搜索对话">
      <div class="srch-mode">
        <button class="act" data-mode="title">标题</button>
        <button data-mode="content">内容</button>
      </div>
    </div>
    <div class="chats" id="chats" role="list"></div>
    <div class="storage-bar" id="storageBar">
      <div>存储: <span id="storageTxt">0KB / 5MB</span></div>
      <div class="bar"><div class="fill" id="storageFill"></div></div>
    </div>
    <div class="sbf">
      <button id="setBtn" aria-label="设置">⚙️ 设置</button>
      <button id="sysBtn" aria-label="系统提示词">📝 系统</button>
      <button id="expBtn" aria-label="导出">📤 导出</button>
      <button id="impBtn" aria-label="导入">📥 导入</button>
    </div>
  </aside>
  <main class="main">
    <div class="top">
      <button class="ibtn menu-btn" id="menuBtn" aria-label="菜单">☰</button>
      <select id="modelSel" aria-label="选择模型"></select>
      <span class="title" id="titleTxt">新对话</span>
      <div class="token-bar" id="tokenBar" title="上下文占用" style="display:none">
        <span id="tokenTxt">0</span>
        <div class="bar"><div class="fill" id="tokenFill"></div></div>
      </div>
    </div>
    <div class="area" id="area" role="log" aria-live="polite">
      <div class="msgs" id="msgs"></div>
    </div>
    <div class="input-zone">
      <div class="input-wrap">
        <div class="draft-tip" id="draftTip">💾 已恢复草稿</div>
        <div class="att-bar" id="attBar"></div>
        <div class="ibox">
          <textarea id="uIn" placeholder="输入消息,Enter 发送,Shift+Enter 换行..." rows="1" aria-label="消息输入"></textarea>
          <button class="sendb" id="sendBtn" aria-label="发送">发送</button>
        </div>
        <div class="tools">
          <label for="fileIn" aria-label="上传附件">📎 附件</label>
          <inputIn" style="display:none" accept=".txt,.md,.json,.js,.py,.html,.css,.csv,.pdf,.docx,image/*" multiple>
          <button id="webBtn" aria-label="联网搜索">🌐 联网</button>
          <button id="reasonBtn" aria-label="深度思考">🧠 思考</button>
          <button id="tempBtn" aria-label="温度">🌡️ <span id="tempVal">0.7</span></button>
          <span class="hint" id="hint">Enter 发送 · Shift+Enter 换行</span>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- 设置对话框 -->
<div class="mask" id="setDlg" role="dialog" aria-modal="true" aria-labelledby="setTitle">
  <div class="dlg">
    <h3 id="setTitle">⚙️ 设置</h3>
    <label>API Key</label>
    <input type="password" id="ap="sk-...">
    <label>API Base URL</label>
    <input type="text" id="apiBase" value="https://zenmux.ai/api/v1">
    <label>温度(0-2)</label>
    <input type="number" id="tempIn" min="0" max="2" step="0.1" value="0.7">
    <label>最大 Tokens</label>
    <input type="number" id="maxTok" value="4096">
    <label>请求超时(秒)</label>
    <input type="number" id="timeoutIn" value="120">
    <label>失败重试次数</label>
    <input type="number" id="retryIn" value="2" min="0" max="5">
    <div class="row">
      <button id="setCancel">取消</button>
      <button class="pri" id="setSave"></div>
  </div>
</div>

<!-- 系统提示词 -->
<div class="mask" id="sysDlg" role="dialog" aria-modal="true">
  <div class="dlg">
    <h3>📝 系统提示词</h3>
    <label>当前对话的系统提示词</label>
    <textarea id="sysTxt" rows="8" placeholder="你是一个有帮助的助手..."></textarea>
    <div class="row">
      <button id="sysCancel">取消</button>
      <button class="pri" id="sysSave">保存</button>
    </div>
  </div>
</div>

<!-- 导出对话框 -->
<div class="mask" id="expDlg" role="dialog" aria-modal="true">
  <div class="dlg">
    <h3>📤 导出</h3>
    <label>选择格式</label>
    <select id="expFmt">
      <option value="snapshot">完整快照 (JSON)</option>
      <option value="md">Markdown (.md)</option>
      <option value="txt">纯文本 (.txt)</option>
      <option value="html">HTML</option>
      <option value="doc">Word (.doc)</option>
    </select>
    <label>范围</label>
    <select id="expScope">
      <option value="current">当前对话</option>

<script>
'use strict';

// ========== 常量与状态 ==========
const SK='zenmux_v2';
const DRAFT_K='zm_draft_';
const SHARE_K='zm_share';
const MAX_TOASTS=4;
const MAX_STORAGE=5*1024*1024;
const WARN_STORAGE=4*1024*1024;

const MODELS=[
  {id:'openai/gpt-4o',name:'GPT-4o',ctx:128000},
  {id:'openai/gpt-4o-mini',name:'GPT-4o Mini',ctx:128000},

  {id:'deepseek/deepseek-r1',name:'DeepSeek R1',ctx:64000},
  {id:'qwen/qwen-2.5-72b-instruct',name:'Qwen 2.5 72B',ctx:32000}
];

let S={
  chats:{},currentChatId:null,
  apiKey:'',apiBase:'https://zenmux.ai/api/v1',
  model:'openai/gpt-4o-mini',
  temp:0.7,maxTok:4096,timeout:120,retry:2,
  theme:'light',web:false,reason:false,

};

let stm=false,abortCtrl=null,mermaidId=0;

// ========== 工具函数 ==========
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const debounce=(fn,ms)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// ========== Toast ==========
function toast(msg,type='ok',dur=3000){
  const wrap=$('toasts');
  while(wrap.children.length>=MAX_TOASTS)wrap.removeChild(wrap.firstChild);
  const t=document.createElement('div');
  t.className='toast '+type;
  t.setAttribute('role','alert');
  t.innerHTML='<span>'+esc(msg)+'</span>';
  wrap.appendChild(t);
  setTimeout(()=>{t.style.animation='in .3s reverse';setTimeout(()=>t.remove(),300)},dur);
}

// ========== 自定义确认框 ==========
function confirmDlg(msg,title='确认'){
  return new Promise(res=>{
    $('confirmTitle').textContent=title;
    $('confirmMsg').textContent=msg;
    $('confirmDlg').classList.add('sh');
    const yes=(′confirmYes′),no=(&#x27;confirmYes&#x27;),no=(′confirmYes′),no=('confirmNo');
    const close=v=>{$('confirmDlg').classList.remove('sh');yes.onclick=null;no.onclick=null;res(v)};
    yes.onclick=()=>close(true);
    no.onclick=()=>close(false);
  });
}

// ========== 存储 ==========
function load(){
  try{
    const d=localStorage.getItem(SK);
    if(d)Object.assign(S,JSON.parse(d));
  }catch(e){console.error('load failed',e)}
}
function save(){
  try{
    const d=JSON.stringify(S);
    localStorage.setItem(SK,d);
    updateStorageBar(d.length);
  }catch(e){
    toast('❌ 存储已满!请立即导出快照并清理旧对话','er',6000);
  }
}
function updateStorageBar(size){
  const txt=(′storageTxt′),fill=(&#x27;storageTxt&#x27;),fill=(′storageTxt′),fill=('storageFill');
  if(!txt)return;
  const mb=(size/1024/1024).toFixed(2);
  txt.textContent=mb+'MB / 5MB';
  const pct=Math.min(100,size/MAX_STORAGE*100);
  fill.style.width=pct+'%';
  fill.className='fill'+(size>WARN_STORAGE?' er':size>WARN_STORAGE*0.75?' wa':'');
  if(size>WARN_STORAGE && !sessionStorage.getItem('warn_shown')){
    toast('⚠️ 存储已用 '+mb+'MB,建议导出并清理旧对话','wa',5000);
    sessionStorage.setItem('warn_shown','1');
  }
}

// ========== 草稿 ==========
function saveDraft(){
  if(!S.currentChatId)return;
  const v=$('uIn').value;
  try{
    if(v)localStorage.setItem(DRAFT_K+S.currentChatId,v);
    else localStorage.removeItem(DRAFT_K+S.currentChatId);
  }catch(e){}
}
function loadDraft(){
  if(!S.currentChatId)return;
  try{
    const v=localStorage.getItem(DRAFT_K+S.currentCh){
      $('uIn').value=v;
      autoResize();
      $('draftTip').classList.add('show');
      setTimeout(()=>$('draftTip').classList.remove('show'),3000);
    }
  }catch(e){}
}
function clearDraft(){
  if(!S.currentChatId)return;
  try{localStorage.removeItem(DRAFT_K+S.currentChatId)}catch(e){}
}

// ========== Markdown 渲染器 ==========
let md;
function initMD(){
  md=window.markdownit({
    html:false,linkify:true,breaks:true,typographer:true,
    highlight(code,lang){
      try{
        if(lang && hljs.getLanguage(lang))
          return hljs.highlight(code,{language:lang,ignoreIllegals:true}).value;
      }catch(e){}
      return esc(code);
    }
  });
  if(window.markdownitTaskLists)md.use(window.markdownitTaskLists,{enabled:false});
  if(window.markdownitFootnote)md.use(window.markdownitFootnote);
  if(window.markdownitMark)md.use(window.markdownitMark);
  if(window.markdownitSub)md.use(window.markdownitSub);
  if(window.markdownitSup)md.use(window.markdownitSup);
  if(window.markdownitIns)md.use(window.markdownitIns);
  if(window.markdownitAbbr)md.use(window.markdownitAbbr);
  if(window.markdownitDeflist)md.use(window.markdownitDeflist);
  if(window.markdownitAttrs)md.use(window.markdownitAttrs);
  // container 插件
  if(window.markdownitContainer){
    ['tip','warning','danger','info'].forEach(name=>{
      md.use(window.markdownitContainer,name,{
        render(tokens,idx){
          const m=tokens[idx].info.trim().match(/^(tip|warning|danger|info)\s+(.*)$/);
          if(tokens[idx].nesting===1){
            const title=m?md.utils.escapeHtml(m[2]):name.toUpperCase();
            return '<div class="md-container '+name+'"><div class="md-container-title">'+title+'</div>\n';
          }
          return '</div>\n';
        }
      });
    });
  }
}

function rMD(text){
  if(!text)return '';
  let t=text;

  // 1. 先保护代码块(三反引号)
  const blocks=[];
  t=t.replace(/```[\s\S]*?```/g,m=>{
    const i=blocks.length;blocks.push(m);
    return '\x00BLOCK'+i+'\x00';
  });
  // 2. 保护行内代码
  const inlines=[];
  t=t.replace(/`[^`\n]+`/g,m=>{
    const i=inlines.length;inlines.push(m);
    return '\x00INLINE'+i+'\x00';
  });

  // 3. 处理数学公式(块级 .........)
  const mathBlocks=[];
  t=t.replace(/\\([\s\S]+?)\\/g,(m,expr)=>{
    try{
      const html=katex.renderToString(expr,{displayMode:true,throwOnError:false});
      const i=mathBlocks..push(html);
      return '\x00MATHB'+i+'\x00';
    }catch(e){return m}
  });
  // 4. 行内数学 .........(避开货币)
  t=t.replace(/(?<![\\w])\(?!\s)([^\n]+?)(?<!\s)\(?![\$\w])/g,(m,expr)=>{
    if(/^\d+([.,]\d+)?$/.test(expr.trim()))return m; // 纯数字视为货币
    try{
      const html=katex.renderToString(expr,{displayMode:false,throwOnError:false});
      const i=mathBlocks.length;mathBlocks.push(html);
      return '\x00MATHB'+i+'\x00';
    }catch(e){return m}
  });

  // 5. 还原代码块
  t=t.replace(/\x00INLINE(\d+)\x00/g,(_,i)=>inlines[+i]);
  t=t.replace(/\x00BLOCK(\d+)\x00/g,(_,i)=>blocks[+i]);

  // 6. Markdown 渲染
  let html;
  try{html=md.render(t)}catch(e){html=esc(t)}

  // 7. 还原数学公式
  html=html.replace(/\x00MATHB(\d+)\x00/g,(_,i)=>mathBlocks[+i]);

  // 8. 代码块增强(header + copy)
  html=html.replace(/<pre><code(?:\s+class="language-(\w+)")?>([\s\S]*?)<\/code><\/pre>/g,(m,lang,code)=>{
    const cid='code_'+uid();
    const langLabel=lang||'text';
    const isMermaid=lang==='mermaid';
    if(isMermaid){
      const raw=code.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&#39;/g,"'");
      return '<div class="mermaid">'+esc(raw)+'</div>';
    }
    return '<div class="code-wrap"><div class="code-h><span>'+esc(langLabel)+'</span>'+
      '<button onclick="cpode(this,\''+cid+'\')" aria-label="复制代码">复制</button></div>'+
      '<pre><code class="hljs language-'+esc(langLabel)+'" id="'+cid+'">'+code+'</code></pre></div>';
  });

  // 9. DOMPurify 加固
  return DOMPurify.sanitize(html,{
    ADD_TAGS:['input'],
    ADD_ATTR:['checked','disabled','type','id','aria-label'],
    FORBID_ATTR:['onerror','onload','onclick','onmouseover','onfocus','onblur','onchange','onsubmit'],
    ALLOWED_URI_REGEXP:/^(?:(?:https?|mailto|tel):|data:image\/|#|\/)/i
  });
}

// 复制代码:从 DOM textContent 直接读,零依赖
window.cpCode=function(btn,cid){
  const el=document.getElementById(cid);
  if(!el)return;
  const code=el.textContent;
  navigator.clipboard.writeText(code).then(()=>{
    const old=btn.textContent;btn.textContent='✓ 已复制';
    setTimeout(()=>btn.textContent=old,1500);
  }).catch(()=>toast('复制失败','er'));
};

// Mermaid 渲染(带错误提示 + 防重复)
async function renderMermaid(){
  if(!window.mermaid)return;
  const els=document.querySelectorAll('.mermaid:not([data-processed])');
  for(const el of els){
    const code=el.textContent;
    try{
      const {svg}=await mermaid.render('m'+(mermaidId++),code);
      el.innerHTML=svg;
      el.setAttribute('data-processed','true');
    }catch(e){
      el.innerHTML='<div class="mermaid-err">⚠️ Mermaid 语法错误: '+esc(e.message||'')+'<pre>'+esc(code)+'</pre></div>';
      el.setAttribute('data-processed','error');
    }
  }
}

// ========== Token 估算 ==========
function estimateTokens(text){
  if(!text)return 0;
  // 粗略:中文 1.5 字/token,英文 4 字/token
  const cn=(text.match(/[\u4e00-\u9fa5]/g)||[]).length;
  const other=text.length-cn;
  return Math.ceil(cn/1.5+other/4);
}
function updateTokenBar(){
  const c=S.chats[S.currentChatId];
  if(!c){$('tokenBar').style.display='none';return}
  const model=MODELS.find(m=>m.id===S.model);
  if(!model){$('tokenBar').style.display='none';return}
  let total=estimateTokens(S.sysPrompt||'');
  (c.msgs||[]).forEach(m=>{
    total+=estimateTokens(m.content||'');
    (m.atts||[]).forEach(a=>total+=estimateTokens(a.content||''));
  });
  total+=estimateTokens($('uIn').value);
  const pct=Math.min(100,total/model.ctx*100);
  $('tokenBar').style.display='flex';
  $('tokenTxt').textContent=total.toLocaleString()+' / '+(model.ctx/1000|0)+'K';
  const fill=$('tokenFill');
  fill.style.width=pct+'%';
  fill.className='fill'+(pct>90?' er':pct>70?' wa':'');
}

// ========== 主题 ==========
function applyTheme(){
  document.documentElement.setAttribute('data-theme',S.theme);
  $('themeBtn').textContent=S.theme==='dark'?'☀️':'🌙';
  const hl=$('hlTheme');
  hl.href='https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github'+(S.theme==='dark'?'-dark':'')+'.min.css';
  if(window.mermaid){
    try{mermaid.initialize({startOnLoad:false,theme:S.theme==='dark'?'dark':'default',securityLevel:'loose'})}catch(e){}
  }
}

// ========== 模型选择 ==========
function fillModels(){
  const sel=$('modelSel');
  sel.innerHTML=MODELS.map(m=>`<option value="m.id&quot;>{m.id}&quot;>m.id&quot;>{esc(m.name)}</option>`).join('');
  sel.value=S.model;
}

// ========== 对话管理 ==========
function newChat(){
  const id=uid();
  S.chats[id]={id,title:'新对话',msgs:[],sysPrompt:'',pinned:false,createdAt:Date.now(),updatedAt:Date.now()};
  S.currentChatId=id;
  currentAtts=[];
  save();
  renderChats();
  renderMs();
  $('uIn').value='';
  loadDraft();
  autoResize();
  updateTokenBar();
}
function switchChat(id){
  saveDraft();
  S.currentChatId=id;
  currentAtts=[];
  renderAtts();
  save();
  renderChats();
  renderMs();
  $('uIn').value='';
  loadDraft();
  autoResize();
  updateTokenBar();
}
async function delChat(id,e){
  e && e.stopPropagation();
  const ok=await confirmDlg('确定删除此对话?此操作不可撤销。','删除对话');
  if(!ok)return;
  delete S.chats[id];
  try{localStorage.removeItem(DRAFT_K+id)}catch(_){}
  if(S.currentChatId===id){
    const rest=Object.keys(S.chats);
    S.currentChatId=rest[0]||null;
  }
  save();
  renderChats();
  renderMs();
  updateTokenBar();
}
function togglePin(id,e){
  e && e.stopPropagation();
  const c=S.chats[id];if(!c)return;
  c.pinned=!c.pinned;save();renderChats();
}

// ========== 渲染侧边栏 ==========
function renderChats(){
  const q=$('srchIn').value.toLowerCase().trim();
  let list=Object.values(S.chats);
  if(q){
    list=list.filter(c=>{
      if(srchMode==='title')return (c.title||'').toLowerCase().includes(q);
      return (c.title||'').toLowerCase().includes(q) || (c.msgs||[]).some(m=>(m.content||'').toLowerCase().includes(q));
    });
  }
  list.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)(b.updatedAt||0)-(a.updatedAt||0));
  const html=list.map(c=>{
    const act=c.id===S.currentChatId?' act':'';
    return `<div class="chat-itemact&quot;role=&quot;listitem&quot;data−id=&quot;{act}&quot; role=&quot;listitem&quot; data-id=&quot;act&quot;role=&quot;listitem&quot;data−id=&quot;{c.id}" onclick="switchChat('${c.id}')">
      ${c.pinned?'<span class="pin">📌</span>':''}
      <span class="ti">${esc(c.title||'新对话')}</span>
      <button class="del" onclick="togglePin('${c.id}',event)" aria-label="置顶" title="置顶">📌</button>
      <button class="del" onclick="delChat('${c.id}',event)" aria-label="删除" title="删除">✕</button>
    </div>`;
  }).join('');
  $('chats').innerHTML=html||'<div style="padding:12px;color:var(--text2);font-size:12px;text-align:center">无对话</div>';
}
window.switchChat=switchChat;
window.delChat=delChat;
window.togglePin=togglePin;

// ========== 渲染消息 ==========
function renderMs(){
  const c=S.chats[S.currentChatId];
  if(!c){
    $('msgs').innerHTML='<div class="empty"><h2>👋 欢迎使用 ZenMux</h2><p>创建或选择一个对话开始吧</p></div>';
    $('titleTxt').textContent='新对话';
    return;
  }
  $('titleTxt').textContent=c.title||'新对话';

  const html=(c.msgs||[]).map((m,i)=>renderMsg(m,i)).join('');
  $('msgs').innerHTML=html;
  renderMermaid();
  scrollBottom();
}

function renderMsg(m,idx){
  const role=m.role==='user'?'u':'a';
  const av=m.role==='user'?'我':'AI';
  const time=new Date(m.ts||Date.now());
  const tStr=time.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});

  let bubHtml;
  if(m.role==='assistant' && m.variants && m.variants.length>1){
    // 对比视图
    const sel=m.selectedVariant||0;
    bubHtml='<div class="bub cmp">'+m.variants.map((v,vi)=>
      `<div class="vi===sel?′sel′:′′&quot;>{vi===sel?&#x27;sel&#x27;:&#x27;&#x27;}&quot;>vi===sel?′sel′:′′&quot;>{rMD(v)}<button class="pick" onclick="pickVariant(idx,{idx},idx,{vi})">选用</button></div>`
    ).join('')+'</div>';
  }else{
    let content=m.content||'';
    if(m.role==='user' && m.atts && m.atts.length){
      const attsHtml=m.atts.map((a,ai)=>
        `<span class="att-badge" onclick="showAtt(idx,{idx},idx,{ai})">{a.type===&#x27;image&#x27;?`<img src=&quot;{esc(a.data)}">`:'📄'} ${esc(a.name)}</span>`
      ).join('');
      content='<div style="margin-bottom:6px">'+attsHtml+'</div>'+content;
      bubHtml='<div class="bub">'+(m.role==='user'?esc(m.content).replace(/\n/g,'<br>'):rMD(m.content))+'<div style="margin-top:6px">'+attsHtml+'</div></div>';
    }else{
      bubHtml='<div class="bub">'+(m.role==='user'?esc(m.content).replace(/\n/g,'<br>'):rMD(m.content))+'</div>';
    }
  }

  const actions=m.role==='assistant'?
    `<button onclick="copyMsg(${idx})" aria-label="复制">📋</button>
     <button onclick="regenMsg(${idx})" aria-label="重新生成">🔄</button>
     <button onclick="delMsg(${idx})" aria-label="删除">🗑️</button>`:
    `<button onclick="editMsg(${idx})" aria-label="编辑">✏️</button>
     <button onclick="delMsg(${idx})" aria-label="删除">🗑️</button>`;

  return `<div class="msg role&quot;data−idx=&quot;{role}&quot; data-idx=&quot;role&quot;data−idx=&quot;{idx}">
    <div class="av">${av}</div>
    <div class="bub-wrap">
      ${bubHtml}
      <div class="meta"><span>tStr</span><divclass=&quot;actions&quot;>{tStr}</span><div class=&quot;actions&quot;>tStr</span><divclass=&quot;actions&quot;>{actions}</div></div>
    </div>
  </div>`;
}

function scrollBottom(force){
  const area=$('area');
  const near=area.scrollHeight-area.scrollTop-area.clientHeight<120;
  if(force||near)area.scrollTop=;
}

// ========== 消息操作 ==========
window.copyMsg=function(i){
  const m=S.chats[S.currentChatId].msgs[i];
  const txt=m.variants?m.variants[m.selectedVariant||0]:m.content;
  navigator.clipboard.writeText(txt).then(()=>toast('已复制','ok'));
};
window.delMsg=async function(i){
  const ok=await confirmDlg('删除这条消息?','确认删除');
  if(!ok)return;
  S.chats[S.currentChatId].msgs.splice(i,1);
  save();renderMs();updateTokenBar();
};
window.editMsg=function(i){
  const m=S.chats[S.currentChatId].msgs[i];
  $('uIn').value=m.content;
  S.chats[S.currentChatId].msgs.splice(i);
  save();renderMs();autoResize();$('uIn').focus();
};
window.regenMsg=async function(i){
  if(stm){toast('请先停止当前回答','wa');return}
  const c=S.chats[S.currentChatId];
  const m=c.msgs[i];
  if(m.role!=='assistant')return;
  // 保留到当前 AI 消息之前
  const history=c.msgs.slice(0,i);
  // 将新生成追加为 variant
  const oldContent=m.variants?m.variants[m.selectedVariant||0]:m.content;
  m.variants=m.variants||[oldContent];
  await sendToAPI(history,newText=>{
    m.variants.push(newText);
    m.selectedVariant=m.variants.length-1;
    m.content=newText;
    save();renderMs();
  });
};
window.pickVariant=function(mi,vi){
  const m=S.chats[S.currentChatId].msgs[mi];
  m.selectedVariant=vi;
  m.content=m.variants[vi];
  save();renderMs();
};
window.showAtt=function(mi,ai){
  const a=S.chats[S.currentChatId].msgs[mi].atts[ai];
  $('attTitle').textContent=a.name;
  if(a.type==='image'){
    $('attPreview').innerHTML='<img src="'+esc(a.data)+'" style="max-width:100%">';
  }else{
    $('attPreview').textContent=a.content||'(无内容)';
  }
  $('attDlg').classList.add('sh');
};

// ========== 发送消息 ==========
async function send(){
  if(stm)return;
  const txt=$('uIn').value.trim();
  if(!txt && currentAtts.length===0){toast('请输入内容','wa');return}
  if(!S.apiKey){toast('请先在设置中配置 API Key','er');$('setDlg').classList.add('sh');return}
  if(!S.currentChatId)newChat();

  const c=S.chats[S.currentChatId];
  const userMsg={role:'user',content:txt,atts:[...currentAtts],ts:Date.now()};
  c.msgs.push(userMsg);
  c.updatedAt=Date.now();
  if(c.msgs.length===1 && txt){
    c.title=txt.slice(0,30);
  }
  $('uIn').value='';
  currentAtts=[];
  renderAtts();
  clearDraft();
  autoResize();
  save();
  renderChats();
  renderMs();
  updateTokenBar();

  await sendToAPI(c.msgs.slice(),newText=>{
    c.msgs.push({role:'assistant',content:newText,ts:Date.now()});
    c.updatedAt=Date.now();
    save();renderMs();updateTokenBar();
  });
}

async function sendToAPI(history,onComplete){
  const msgs=[];
  if(S.sysPrompt)msgs.push({role:'system',content:S.sysPrompt});
  history.forEach(m=>{
    let content=m.content||'';
    if(m.atts && m.atts.length){
      // 文本附件拼接;图片附件走 vision 格式
      const imgs=m.atts.filter(a=>a.type==='image');
      const txts=m.atts.filter(a=>a.type!=='image');
      txts.forEach(a=>{content+='\n\n--- 附件: '+a.name+' ---\n'+(a.content||'')});
      if(imgs.length && m.role==='user'){
        const parts=[{type:'text',text:content}];
        imgs.forEach(a=>parts.push({type:'image_url',image_url:{url:a.data}}));
        msgs.push({role:m.role,content:parts});
        return;
      }
    }
    msgs.push({role:m.role,content});
  });

  // 添加占位 AI 消息用于流式渲染
  const c=S.chats[S.currentChatId];
  const placeholder={role:'assistant',content:'',ts:Date.now(),_streaming:true};
  c.msgs.push(placeholder);
  renderMs();

  const bub=document.querySelector('.msg.a:last-child .bub');
  pendingBub=bub;

  stm=true;
  $('sendBtn').textContent='停止';
  $('sendBtn').className='stopb';
  $('sendBtn').disabled=false;

  let attempt=0;
  const maxRetry=S.retry||0;
  let success=false,finalText='';

  while(attempt<=maxRetry && !success){
    try{
      finalText=await callAPIOnce(msgs,bub);
      success=true;
    }catch(e){
      if(e.name==='AbortError'){
        break;
      }
      attempt++;
      if(attempt>maxRetry){
        bub.innerHTML='<span style="color:var(--er)">❌ 错误: '+esc(e.message)+'</span>';
        toast('请求失败: '+e.message,'er',5000);
        break;
      }
      bub.innerHTML='<span style="color:var(--wa)">⚠️ 第 '+attempt+' 次重试中...</span>';
      await sleep(1000*Math.pow(2,attempt-1));
    }
  }

  // 收尾
  stm=false;
  $('sendBtn').textContent='发送';
  $('sendBtn').className='sendb';
  abortCtrl=null;
  if(renderTimer){clearTimeout(renderTimer);renderTimer=null}

  // 移除占位,交给 onComplete 处理
  c.msgs.pop();
  if(success){
    onComplete(finalText);
  }else if(finalText){
    // 部分内容也保存
    onComplete(finalText);
  }else{
    renderMs();
  }
}

async function callAPIOnce(msgs,bub){
  abortCtrl=new AbortController();
  const timeoutId=setTimeout(()=>abortCtrl.abort(),S.timeout*1000);

  const body={
    model:S.model,
    messages:msgs,
    stream:true,
    temperature:S.temp,
    max_tokens:S.maxTok
  };
  if(S.reason)body.reasoning={effort:'medium'};
  if(S.web)body.plugins=[{id:'web'}];

  const resp=await fetch(S.apiBase+'/chat/completions',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer '+S.apiKey
    },
    body:JSON.stringify(body),
    signal:abortCtrl.signal
  });

  clearTimeout(timeoutId);

  if(!resp.ok){
    const t=awaitw new Error(resp.status+'slice(0,200));
  }

  const reader=resp.body.getReader();
  const decoder=new TextDecoder();
  let buf='',full='';

  while(true){
    const {done,value}=await reader.read();
    if(done)break;
    buf+=decoder.decode(value,{stream:true});
    const lines=buf.split('\n');
    buf=lines.pop();
    for(const line of lines){
      if(!line.startsWith('data:'))continue;
      const data=line.slice(5).trim();
      if(data==='[DONE]')continue;
      try{
        const json=JSON.parse(data);
        const delta=json.choices?.[0]?.delta?.content||'';
        if(delta){
          full+=delta;
          scheduleRender(bub,full);
        }
      }catch(e){}
    }
  }

  // 最终完整渲染
  if(renderTimer){clearTimeout(renderTimer);renderTimer=null}
  bub.innerHTML=rMD(full);
  renderMermaid();
  scrollBottom();

  return full;
}

// 节流流式渲染
function scheduleRender(bub,full){
  pendingContent=full;
  pendingBub=bub;
  if(renderTimer)return;
  renderTimer=setTimeout(()=>{
    if(pendingBub && pendingContent!==null){
      pendingBub.innerHTML=rMD(pendingContent)+'<span class="typing">▌</span>';
      scrollBottom();
    }
    renderTimer=null;
  },80);
}

function stopStream(){
  if(abortCtrl){
    abortCtrl.abort();
    toast('已停止','ok');
  }
}

// ========== 附件处理 ==========
async function handleFiles(files){
  for(const f of files){
    if(f.size>10*1024*1024){toast(f.name+' 超过 10MB','er');continue}
    try{
      const att=await parseFile(f);
      currentAtts.push(att);
    }catch(e){
      toast('解析失败: '+f.name,'er');
    }
  }
  renderAtts();
  updateTokenBar();
}

async function parseFile(f){
  const name=f.name;
  if(f.type.startsWith('image/')){
    const data=await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);
    });
    return {name,type:'image',data,size:f.size};
  }
  if(name.endsWith('.pdf')){
    const buf=await f.arrayBuffer();
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let text='';
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const c=await page.getTextContent();
      text+=c.items.map(it=>it.str).join(' ')+'\n\n';
    }
    return {name,type:'text',content:text,size:f.size};
  }
  if(name.endsWith('.docx')){
    const buf=await f.arrayBuffer();
    const r=await mammoth.extractRawText({arrayBuffer:buf});
    return {name,type:'text',content:r.value,size:f.size};
  }
  const text=await f.text();
  return {name,type:'text',content:text,size:f.size};
}

function renderAtts(){
  const bar=$('attBar');
  bar.innerHTML=currentAtts.map((a,i)=>
    `<span class="att-badge" onclick="previewCurAtt(i)&quot;>{i})&quot;>i)&quot;>{a.type==='image'?`<img src="{esc(a.data)}&quot;>`:&#x27;📄&#x27;}{esc(a.name)} <button class="rm" onclick="rmAtt(${i},event)" aria-label="移除">×</button></span>`
  ).join('');
}
window.rmAtt=function(i,e){
  e && e.stopPropagation();
  currentAtts.splice(i,1);
  renderAtts();updateTokenBar();
};
window.previewCurAtt=function(i){
  const a=currentAtts[i];
  $('attTitle').textContent=a.name;
  if(a.type==='image'){
    $('attPreview').innerHTML='<img src="'+esc(a.data)+'" style="max-width:100%">';
  }else{
    $('attPreview').textContent=a.content||'';
  }
  $('attDlg').classList.add('sh');
};

// ========== 输入框 ==========
function autoResize(){
  const ta=$('uIn');
  ta.style.height='auto';
  ta.style.height=Math.min(200,ta.scrollHeight)+'px';
}

// ========== 分享 ==========
function shareChat(){
  const c=S.chats[S.currentChatId];
  if(!c){toast('无对话可分享','wa');return}
  const payload={title:c.title,msgs:c.msgs.map(m=>({role:m.role,content:m.variants?m.variants[m.selectedVariant||0]:m.content,ts:m.ts}))};
  const b64=btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  const url=location.origin+location.pathname+'#share='+b64;
  $('shareUrl').textContent=url;
  $('shareDlg').classList.add('sh');
  $('shareCopy').onclick=()=>{
    navigator.clipboard.writeText(url).then(()=>toast('链接已复制','ok'));
  };
}

function checkShareLink(){
  if(location.hash.startsWith('#share=')){
    try{
      const b64=location.hash.slice(7);
      const data=JSON.parse(decodeURIComponent(escape(atob(b64))));
      // 创建只读对话
      const id='shared_'+uid();
      S.chats[id]={id,title:'[分享] '+data.title,msgs:data.msgs,sysPrompt:'',readonly:true,createdAt:Date.now(),updatedAt:Date.now()};
      S.currentChatId=id;
      save();
      toast('已加载分享对话','ok');
      history.replaceState(null,'',location.pathname);
    }catch(e){toast('分享链接无效','er')}
  }
}

// ========== 导出 ==========
function doExport(){
  const fmt=(′expFmt′).value,scope=(&#x27;expFmt&#x27;).value,scope=(′expFmt′).value,scope=('expScope').value;
  const chats=scope==='current'?[S.chats[S.currentChatId]].filter(Boolean):Object.values(S.chats);
  if(!chats.length){toast('无内容可导出','wa');return}

  let content='',filename='',mime='text/plain';
  const tsStr=new Date().toISOString().slice(0,10);

  if(fmt==='snapshot'){
    content=JSON.stringify({version:2,exportAt:Date.now(),chats,settings:{model:S.model,temp:S.temp,maxTok:S.maxTok}},null,2);
    filename=`zenmux_snapshot_${tsStr}.json`;
    mime='application/json';
  }else if(fmt==='md'){
    content=chats.map(c=>{
      let s=`# ${c.title}\n\n`;
      (c.msgs||[]).forEach(m=>{
        const txt=m.variants?m.variants[m.selectedVariant||0]:m.content;
        s+=`## m.role===′user′?′👤用户′:′🤖AI′\n\n{m.role===&#x27;user&#x27;?&#x27;👤 用户&#x27;:&#x27;🤖 AI&#x27;}\n\nm.role===′user′?′👤用户′:′🤖AI′\n\n{txt}\n\n`;
      });
      return s;
    }).join('\n---\n\n');
    filename=`zenmux_${tsStr}.md`;mime='text/markdown';
  }else if(fmt==='txt'){
    content=chats.map(c=>{
      let s=`=== ${c.title} ===\n\n`;
      (c.msgs||[]).forEach(m=>{
        const txt=m.variants?m.variants[m.selectedVariant||0]:m.content;
        s+=`[m.role===′user′?′用户′:′AI′]\n{m.role===&#x27;user&#x27;?&#x27;用户&#x27;:&#x27;AI&#x27;}]\nm.role===′user′?′用户′:′AI′]\n{txt}\n\n`;
      });
      return s;
    }).join('\n');
    filename=`zenmux_${tsStr}.txt`;
  }else if(fmt==='html'){
    content='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>ZenMux 导出</title><style>body{font-family:sans-serif;max-width:800px;margin:2em auto;padding:0 1em}.u{background:#e0f2f1;padding:10px;border-radius:8px;margin:8px 0}.a{background:#f5f5f5;padding:10px;border-radius:8px;margin:8px 0}h1{border-bottom:2px solid #10a37f}</style></head><body>';
    chats.forEach(c=>{
      content+=`<h1>${esc(c.title)}</h1>`;
      (c.msgs||[]).forEach(m=>{
        const txt=m.variants?m.variants[m.selectedVariant||0]:m.content;
        content+=`<div class="m.role===′user′?′u′:′a′&quot;><b>{m.role===&#x27;user&#x27;?&#x27;u&#x27;:&#x27;a&#x27;}&quot;><b>m.role===′user′?′u′:′a′&quot;><b>{m.role==='user'?'👤':'🤖'}</b><br>${rMD(txt)}</div>`;
      });
    });
    content+='</body></html>';
    filename=`zenmux_${tsStr}.html`;mime='text/html';
  }else if(fmt==='doc'){
    content='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"></head><body>';
    chats.forEach(c=>{
      content+=`<h1>${esc(c.title)}</h1>`;
      (c.msgs||[]).forEach(m=>{
        const txt=m.variants?m.variants[m.selectedVariant||0]:m.content;
        content+=`<p><b>m.role===′user′?′用户′:′AI′:</b></p><div>{m.role===&#x27;user&#x27;?&#x27;用户&#x27;:&#x27;AI&#x27;}:</b></p><div>m.role===′user′?′用户′:′AI′:</b></p><div>{rMD(txt)}</div>`;
      });
    });
    content+='</body></html>';
    filename=`zenmux_${tsStr}.doc`;mime='application/msword';
  }

  const blob=new Blob([content],{type:mime});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=filename;a.click();
  URL.revokeObjectURL(a.href);
  $('expDlg').classList.remove('sh');
  toast('导出成功','ok');
}

// ========== 导入 ==========
function doImport(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json';
  inp.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    try{
      const txt=await f.text();
      const data=JSON.parse(txt);
      if(data.chats){.chats.forEach(c=>{S.chats[c.id]=c});
        save();renderChats();renderMs();
        toast('导入 '+data.chats.length+' 个对话','ok');
      }
    }catch(e){toast('导入失败','er')}
  };
  inp.click();
}

// ========== 事件绑定 ==========
function bindEvents(){
  $('newBtn').onclick=newChat;
  $('themeBtn').onclick=()=>{S.theme=S.theme==='dark'?'light':'dark';applyTheme();save()};
  (′menuBtn′).onclick=()=>(&#x27;menuBtn&#x27;).onclick=()=>(′menuBtn′).onclick=()=>('sb').classList.toggle('hid');

  // 搜索
  $('srchIn').oninput=debounce(renderChats,200);
  document.querySelectorAll('.srch-mode button').forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll('.srch-mode button').forEach(x=>x.classList.remove('act'));
      b.classList.add('act');
      srchMode=b.dataset.mode;
      renderChats();
    };
  });

  // 模型
  $('modelSel').onchange=e=>{S.model=e.target.value;save();updateTokenBar()};

  // 发送
  $('sendBtn').onclick=()=>stm?stopStream():send();
  $('uIn').addEventListener('keydown',e=>{
    if(e.key==='Enter' && !e.shiftKey && !e.isComposing){
      e.preventDefault();send();
    }
  });
  $('uIn').addEventListener('input',()=>{
    autoResize();
    updateTokenBar();
    clearTimeout(draftSaveTimer);
    draftSaveTimer=setTimeout(saveDraft,500);
  });

  // 粘贴图片
  $('uIn').addEventListener('paste',async e=>{
    const items=e.clipboardData?.items||[];
    const imgs=[];
    for(const it of items){
      if(it.type.startsWith('image/')){
        const f=it.getAsFile();if(f)imgs.push(f);
      }
    }
    if(imgs.length){
      e.preventDefault();
      await handleFiles(imgs);
      toast('已粘贴 '+imgs.length+' 张图片','ok');
    }
  });

  // 附件
  $('fileIn').onchange=async e=>{
    await handleFiles(Array.from(e.target.files));
    e.target.value='';
  };

  // 工具按钮
  $('webBtn').onclick=e=>{S.web=!S.web;e.target.classList.toggle('act',S.web);save()};
  $('reasonBtn').onclick=e=>{S.reason=!S.reason;e.target.classList.toggle('act',S.reason);save()};
  $('tempBtn').onclick=()=>{
    const v=prompt('温度(0-2):',S.temp);
    if(v!==null){const n=parseFloat(v);if(!isNaN(n) && n>=0 && n<=2){S.temp=n;$('tempVal').textContent=n;save()}}
  };

  // 设置
  $('setBtn').onclick=()=>{
    (′apiKey′).value=S.apiKey;(&#x27;apiKey&#x27;).value=S.apiKey;(′apiKey′).value=S.apiKey;('apiBase').value=S.apiBase;
    (′tempIn′).value=S.temp;(&#x27;tempIn&#x27;).value=S.temp;(′tempIn′).value=S.temp;('maxTok').value=S.maxTok;
    (′timeoutIn′).value=S.timeout;(&#x27;timeoutIn&#x27;).value=S.timeout;(′timeoutIn′).value=S.timeout;('retryIn').value=S.retry;
    $('setDlg').classList.add('sh');
  };
  (′setCancel′).onclick=()=>(&#x27;setCancel&#x27;).onclick=()=>(′setCancel′).onclick=()=>('setDlg').classList.remove('sh');
  $('setSave').onclick=()=>{
    S.apiKey=$('apiKey').value.trim();
    S.apiBase=$('apiBase').value.trim()||'https://zenmux.ai/api/v1';
    S.temp=parseFloat($('tempIn').value)||0.7;
    S.maxTok=parseInt($('maxTok').value)||4096;
    S.timeout=parseInt($('timeoutIn').value)||120;
    S.retry=parseInt($('retryIn').value)||2;
    $('tempVal').textContent=S.temp;
    save();$('setDlg').classList.remove('sh');toast('已保存','ok');
  };

  // 系统提示词
  (&#x27;sysBtn&#x27;).onclick=()=>{('sysTxt').value=S.sysPrompt||'';$('sysDlg').classList.add('sh')};
  (′sysCancel′).onclick=()=>(&#x27;sysCancel&#x27;).onclick=()=>(′sysCancel′).onclick=()=>('sysDlg').classList.remove('sh');
  (&#x27;sysSave&#x27;).onclick=()=>{S.sysPrompt=('sysTxt').value;g').classList.remove('sh');updateTokenBar();toast('已保存','ok')};

  // 导出 / 导入
  (′expBtn′).onclick=()=>(&#x27;expBtn&#x27;).onclick=()=>(′expBtn′).onclick=()=>('expDlg').classList('sh');
  (′expCancel′).onclick=()=>(&#x27;expCancel&#x27;).onclick=()=>(′expCancel′).onclick=()=>('expDlg').classList.remove('sh');
  $('expDo').onclick=doExport;
  $('impBtn').onclick=doImport;

  // 附件预览
  (′attClose′).onclick=()=>(&#x27;attClose&#x27;).onclick=()=>(′attClose′).onclick=()=>('attDlg').classList.remove('sh');
  (′shareClose′).onclick=()=>(&#x27;shareClose&#x27;).onclick=()=>(′shareClose′).onclick=()=>('shareDlg').classList.remove('sh');

  // Esc 关闭对话框
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){
      document.querySelectorAll('.mask.sh').forEach(m=>m.classList.remove('sh'));
    }
    // Ctrl+K 新建
    if((e.ctrlKey||e.metaKey) && e.key==='k'){e.preventDefault();newChat()}
    // Ctrl+Shift+S 分享
    if((e.ctrlKey||e.metaKey) && e.shiftKey && e.key==='S'){e.preventDefault();shareChat()}
  });

  // 标题栏双击分享
  $('titleTxt').ondblclick=shareChat;

  // Visual Viewport(移动端键盘)
  if(window.visualViewport){
    visualViewport.addEventListener('resize',()=>{
      document.body.style.height=visualViewport.height+'px';
    });
  }

  // 页面关闭前保存草稿
  window.addEventListener('beforeunload',()=>{saveDraft()});
}

// ========== 启动 ==========
function boot(){
  load();
  initMD();
  if(window.mermaid){
    try{mermaid.initialize({startOnLoad:false,theme:S.theme==='dark'?'dark':'default',securityLevel:'loose'})}catch(e){}
  }
  if(Object.keys(S.chats).length===0){
    const id=uid();
    S.chats[id]={id,title:'新对话',msgs:[],sysPrompt:'',createdAt:Date.now(),updatedAt:Date.now()};
    S.currentChatId=id;
  }
  if(!S.currentChatId || !S.chats[S.currentChatId]){
    S.currentChatId=Object.keys(S.chats)[0];
  }
  checkShareLink();
  applyTheme();
  fillModels();
  $('tVal').textContent=S.temp;
  $('webBtn').classList.toggle('act',S.web);
  $('reasonBtn').classList.toggle('act',S.reason);
  renderChats();
  renderMs();
  loadDraft();
  autoResize();
  updateTokenBar();
  save(); // 触发存储条更新
  bindEvents();
}
boot();
</script>
