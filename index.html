<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZenMux 创作者工作站</title>
    <!-- 核心渲染引擎 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/13.0.2/markdown-it.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <!-- 数学公式 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <!-- 流程图 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js"></script>
    <!-- 安全 -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <!-- markdown-it 插件 -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-sub@2.0.0/dist/markdown-it-sub.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-sup@2.0.0/dist/markdown-it-sup.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-mark@4.0.0/dist/markdown-it-mark.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote@4.0.0/dist/markdown-it-footnote.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists@2.1.1/dist/cjs/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-emoji@3.0.0/dist/markdown-it-emoji.min.js"></script>
    <!-- PDF/DOCX 解析 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#f7f8fa;--card:#fff;--text:#1f2937;--text2:#6b7280;--border:#e5e7eb;--pri:#667eea;--pri-h:#5a6fd6;--pri-l:rgba(102,126,234,0.08);--ok:#10b981;--err:#ef4444;--sb-w:260px;--hdr:50px;--code-bg:#f6f8fa}
        [data-theme="dark"]{--bg:#0f1117;--card:#1a1d2e;--text:#e2e8f0;--text2:#94a3b8;--border:#2d3348;--pri:#818cf8;--pri-h:#6366f1;--pri-l:rgba(129,140,248,0.1);--ok:#34d399;--err:#f87171;--code-bg:#1e2235}
        html,body{height:100%;overflow:hidden}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s}
        .app{display:flex;height:100%}
        .sb{width:var(--sb-w);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;flex-shrink:0;z-index:1000;transition:transform .3s,background .3s}
        .sb-hdr{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .sb-hdr h1{font-size:15px;display:flex;align-items:center;gap:5px}
        .sb-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:3px}
        .sb-ft{padding:8px;border-top:1px solid var(--border)}
        .badge{font-size:10px;color:var(--text2);padding:6px 9px;background:var(--pri-l);border-radius:6px;line-height:1.5;margin-bottom:5px}
        .badge strong{color:var(--pri)}
        .search{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none;background:var(--bg);margin-bottom:5px;color:var(--text)}
        .search:focus{border-color:var(--pri)}
        .cl{list-style:none}
        .ci{padding:7px 9px;border-radius:6px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px;margin-bottom:1px;transition:background .1s}
        .ci:hover{background:var(--pri-l)}
        .ci.act{background:var(--pri-l);color:var(--pri);font-weight:600}
        .ci .ct{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .ci .ia{display:none;gap:2px}
        .ci:hover .ia{display:flex}
        .ci .ia button{background:none;border:none;cursor:pointer;font-size:12px;padding:2px 3px;border-radius:3px;color:var(--text2)}
        .ci .ia button:hover{color:var(--err)}
        .sl{font-size:9px;color:var(--text2);padding:5px 9px 2px;font-weight:600;text-transform:uppercase}
        @media(max-width:768px){
            .sb{position:fixed;left:0;top:0;height:100%;transform:translateX(-100%)}
            .sb.open{transform:translateX(0)}
            .sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999}
            .sb-ov.show{display:block}
        }
        .main{flex:1;display:flex;flex-direction:column;height:100%;min-width:0;overflow:hidden}
        .hdr{height:var(--hdr);min-height:var(--hdr);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;background:var(--card);flex-shrink:0;transition:background .3s}
        .menu-btn{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);padding:4px}
        @media(max-width:768px){.menu-btn{display:block}}
        .title-in{flex:1;border:none;outline:none;font-size:15px;font-weight:600;background:transparent;color:var(--text);min-width:0}
        .hdr-acts{display:flex;gap:2px;flex-shrink:0}
        .hdr-acts button{background:none;border:none;font-size:15px;cursor:pointer;padding:4px;border-radius:5px;color:var(--text2)}
        .hdr-acts button:hover{background:var(--pri-l);color:var(--pri)}
        .msgs{flex:1;overflow-y:auto;padding:16px 20px;min-height:0}
        @media(max-width:768px){.msgs{padding:12px 8px}}
        .lm{text-align:center;margin-bottom:14px}
        .lm button{background:var(--pri-l);border:none;color:var(--pri);padding:5px 14px;border-radius:14px;font-size:12px;cursor:pointer}
        .msg{display:flex;gap:10px;margin-bottom:20px;align-items:flex-start}
        .msg.user{flex-direction:row-reverse}
        .av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
        .msg.assistant .av{background:#e8f5e9}
        .msg.user .av{background:#e3f2fd}
        [data-theme="dark"] .msg.assistant .av{background:#1b3329}
        [data-theme="dark"] .msg.user .av{background:#1b2733}
        .mb{min-width:40px;max-width:min(85%,900px)}
        .bub{padding:10px 14px;border-radius:14px;line-height:1.75;font-size:14px;word-break:break-word;position:relative}
        .msg.assistant .bub{background:var(--card);border-top-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
        .msg.user .bub{background:#d1e7ff;border-top-right-radius:4px;white-space:pre-wrap}
        [data-theme="dark"] .msg.user .bub{background:#1e3a5f}
        .msg.assistant .bub p{margin-bottom:.6em}.msg.assistant .bub p:last-child{margin-bottom:0}
        /* 代码块 */
        .msg.assistant .bub pre{background:var(--code-bg);border-radius:8px;padding:12px;overflow-x:auto;margin:8px 0;font-size:13px;line-height:1.5;position:relative}
        .msg.assistant .bub code{font-family:'SF Mono',Monaco,Consolas,monospace;font-size:13px}
        .msg.assistant .bub code:not([class]){background:var(--code-bg);padding:1px 5px;border-radius:3px;font-size:12px}
        .msg.assistant .bub ul,.msg.assistant .bub ol{padding-left:1.5em;margin:.4em 0}
        .msg.assistant .bub li{margin-bottom:.3em}
        .msg.assistant .bub blockquote{border-left:3px solid var(--pri);padding-left:12px;margin:.5em 0;color:var(--text2)}
        .msg.assistant .bub img{max-width:100%;border-radius:8px;cursor:pointer;transition:transform .2s}
        .msg.assistant .bub img:hover{transform:scale(1.02)}
        .msg.assistant .bub a{color:var(--pri);text-decoration:underline}
        .msg.assistant .bub a:hover{opacity:.8}
        .msg.assistant .bub mark{background:rgba(255,230,0,.3);padding:1px 3px;border-radius:2px}
        .msg.assistant .bub table{border-collapse:collapse;margin:8px 0;font-size:13px;display:block;overflow-x:auto;max-width:100%}
        .msg.assistant .bub th,.msg.assistant .bub td{border:1px solid var(--border);padding:6px 10px;text-align:left}
        .msg.assistant .bub th{background:var(--pri-l);font-weight:600}
        .msg.assistant .bub .task-list-item{list-style:none;margin-left:-1.5em}
        .msg.assistant .bub .task-list-item input{margin-right:6px}
        .msg.assistant .bub hr{border:none;border-top:1px solid var(--border);margin:12px 0}
        .msg.assistant .bub sup,.msg.assistant .bub sub{font-size:0.75em}
        .msg.assistant .bub .footnotes{font-size:12px;color:var(--text2);border-top:1px solid var(--border);margin-top:12px;padding-top:8px}
        /* 代码块工具栏 */
        .code-wrap{position:relative;margin:8px 0}
        .code-wrap pre{margin:0!important}
        .code-lang{position:absolute;top:6px;left:12px;font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;pointer-events:none}
        .code-copy-top{position:absolute;top:6px;right:8px;background:var(--card);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:11px;cursor:pointer;color:var(--text2);transition:all .15s;z-index:1}
        .code-copy-top:hover{color:var(--pri);border-color:var(--pri)}
        .code-copy-bottom{display:flex;justify-content:flex-end;margin-top:4px}
        .code-copy-bottom button{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:3px 10px;font-size:11px;cursor:pointer;color:var(--text2);transition:all .15s}
        .code-copy-bottom button:hover{color:var(--pri);border-color:var(--pri)}
        /* 长代码折叠 */
        .code-collapsed pre{max-height:200px;overflow:hidden}
        .code-collapsed::after{content:'';position:absolute;bottom:28px;left:0;right:0;height:40px;background:linear-gradient(transparent,var(--code-bg));pointer-events:none}
        .code-toggle{text-align:center;margin-top:4px}
        .code-toggle button{background:var(--pri-l);border:none;color:var(--pri);padding:3px 12px;border-radius:10px;font-size:11px;cursor:pointer}
        /* Mermaid */
        .mermaid-wrap{background:var(--card);border-radius:8px;padding:16px;margin:8px 0;overflow-x:auto;text-align:center}
        /* 数学公式 */
        .katex-display{margin:.8em 0;overflow-x:auto;overflow-y:hidden}
        .katex{font-size:1.1em}
        /* 消息元数据 */
        .mf{margin-bottom:4px}
        .fb{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;background:var(--pri-l);border-radius:4px;font-size:11px;color:var(--pri);margin-right:3px}
        .mm{display:flex;align-items:center;gap:5px;margin-top:5px;font-size:11px;color:var(--text2);flex-wrap:wrap}
        .msg.user .mm{justify-content:flex-end}
        .mm button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:11px;padding:2px 5px;border-radius:3px}
        .mm button:hover{background:var(--pri-l);color:var(--pri)}
        .msg-time{font-size:10px;color:var(--text2);opacity:.7}
        .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text2);gap:8px}
        .empty .ico{font-size:42px}
        .empty p{font-size:14px}
        /* 输入区 */
        .inp-area{border-top:1px solid var(--border);padding:10px 20px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:var(--card);flex-shrink:0;transition:background .3s}
        @media(max-width:768px){.inp-area{padding:8px}}
        .inp-wrap{display:flex;gap:8px;align-items:flex-end}
        .att-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--card);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .att-btn:hover{border-color:var(--pri);color:var(--pri)}
        .att-btn.has{border-color:var(--pri);background:var(--pri-l);color:var(--pri)}
        .inp-box{flex:1;min-width:0}
        .inp-box textarea{width:100%;border:1px solid var(--border);border-radius:12px;padding:9px 14px;font-size:14px;resize:none;outline:none;min-height:38px;max-height:130px;line-height:1.5;font-family:inherit;background:var(--bg);color:var(--text)}
        .inp-box textarea:focus{border-color:var(--pri)}
        .send{width:38px;height:38px;border-radius:10px;background:var(--pri);color:#fff;border:none;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .send:hover{background:var(--pri-h)}
        .send.stop{background:var(--err)}
        .att-pan{display:none;position:absolute;bottom:46px;left:0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);width:260px;z-index:100}
        .att-pan.show{display:block}
        /* 按钮 */
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:13px;cursor:pointer;transition:all .12s;white-space:nowrap}
        .btn:hover{border-color:var(--pri);color:var(--pri)}
        .btn-p{background:var(--pri);color:#fff;border-color:var(--pri)}.btn-p:hover{background:var(--pri-h)}
        .btn-d{color:var(--err);border-color:var(--err)}.btn-d:hover{background:var(--err);color:#fff}
        .btn-s{padding:5px 10px;font-size:12px}
        .btn-b{width:100%}
        /* 模态框 */
        .mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center;padding:12px}
        .mo.show{display:flex}
        .md{background:var(--card);border-radius:16px;width:100%;max-width:540px;max-height:82vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
        .md-h{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1;border-radius:16px 16px 0 0}
        .md-h h2{font-size:16px}
        .md-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2)}
        .md-b{padding:16px 20px 20px}
        .fg{margin-bottom:14px}
        .fg label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
        .fg input,.fg textarea,.fg select{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;outline:none;font-family:inherit;background:var(--bg);color:var(--text)}
        .fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--pri)}
        .fr{display:flex;gap:8px}
        .fr .fg{flex:1}
        .pt{display:flex;align-items:center;gap:8px;margin-bottom:6px}
        .pt input[type="checkbox"]{width:15px;height:15px;accent-color:var(--pri)}
        .pt label{margin:0;font-size:13px;font-weight:500;color:var(--text)}
        .ps{margin-bottom:12px;padding-left:23px}
        .ps input[type="range"]{width:100%;accent-color:var(--pri)}
        .ps .pv{font-size:12px;color:var(--pri);font-weight:600}
        .presets{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
        .presets button{padding:4px 8px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:var(--card);cursor:pointer;color:var(--text)}
        .presets button:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-l)}
        .tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
        .tab{padding:6px 12px;border:none;background:transparent;font-size:13px;cursor:pointer;border-radius:7px;color:var(--text2)}
        .tab.act{background:var(--pri-l);color:var(--pri);font-weight:600}
        /* Toast */
        .tc{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
        .tt{padding:10px 16px;border-radius:10px;background:var(--card);box-shadow:0 4px 14px rgba(0,0,0,.12);font-size:13px;animation:si .3s;max-width:300px;pointer-events:auto}
        .tt.ok{border-left:4px solid var(--ok)}.tt.er{border-left:4px solid var(--err)}
        @keyframes si{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
        [data-theme="dark"] ::-webkit-scrollbar-thumb{background:#4b5563}
        /* 图片灯箱 */
        .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:3000;align-items:center;justify-content:center;cursor:zoom-out}
        .lightbox.show{display:flex}
        .lightbox img{max-width:92vw;max-height:92vh;border-radius:8px}
    </style>
</head>
<body>
<div class="app">
    <div class="sb-ov" id="sbOv" onclick="togSB()"></div>
    <aside class="sb" id="sb">
        <div class="sb-hdr"><h1>🐙 ZenMux</h1><button class="btn btn-s" onclick="openM('set')">⚙️</button></div>
        <div class="sb-body">
            <div class="badge" id="badge"></div>
            <button class="btn btn-p btn-b" onclick="newChat()">➕ 新建对话</button>
            <input type="text" class="search" id="schIn" placeholder="🔍 搜索..." oninput="renderSB()">
            <div class="sl" id="pinLbl" style="display:none">📌 置顶</div>
            <ul class="cl" id="pinList"></ul>
            <div class="sl">💬 对话</div>
            <ul class="cl" id="chatList"></ul>
            <div class="sl" id="arcLbl" style="display:none">📦 归档</div>
            <ul class="cl" id="arcList"></ul>
        </div>
        <div class="sb-ft"><button class="btn btn-b btn-s" onclick="openM('snap')">📦 快照迁移</button></div>
    </aside>
    <div class="main">
        <header class="hdr">
            <button class="menu-btn" onclick="togSB()">☰</button>
            <input type="text" class="title-in" id="titleIn" placeholder="标题" onchange="updTitle(this.value)">
            <div class="hdr-acts">
                <button onclick="openM('cs')" title="设置">🎛️</button>
                <button onclick="openM('exp')" title="导出">📥</button>
                <button onclick="pinC()" title="置顶" id="pinBtn">📌</button>
                <button onclick="arcC()" title="归档">📦</button>
                <button onclick="clrC()" title="清空">🗑️</button>
                <button onclick="togTheme()" title="切换主题" id="themeBtn">🌙</button>
            </div>
        </header>
        <div class="msgs" id="msgsArea"><div class="empty"><div class="ico">🐙</div><p>开始新的对话吧</p></div></div>
        <div class="inp-area">
            <div class="inp-wrap">
                <div style="position:relative">
                    <button class="att-btn" id="attBtn" onclick="togAtt()">📎</button>
                    <div class="att-pan" id="attPan">
                        <div class="fg" style="margin-bottom:6px"><label>上传文件</label><input type="file" id="attIn" accept=".txt,.md,.py,.json,.csv,.log,.pdf,.docx,.png,.jpg,.jpeg,.gif,.webp,.xml,.yaml,.yml,.toml,.ini,.conf,.html,.htm,.css,.js,.ts,.jsx,.tsx,.java,.c,.cpp,.go,.rs,.rb,.php,.swift,.kt,.sql,.sh,.bat" onchange="onAtt(this)"></div>
                        <div class="pt"><input type="checkbox" id="attCont"><label for="attCont">🔄 持续参考</label></div>
                        <div id="attInfo" style="display:none;font-size:11px;color:var(--pri);margin-top:4px"></div>
                    </div>
                </div>
                <div class="inp-box"><textarea id="uIn" placeholder="输入消息... (Enter发送, Shift+Enter换行)" rows="1" onkeydown="hKey(event)" oninput="aRsz(this)"></textarea></div>
                <button class="send" id="sendBtn" onclick="send()">➤</button>
            </div>
        </div>
    </div>
</div>

<!-- 模态框 -->
<div class="mo" id="mo-set"><div class="md"><div class="md-h"><h2>⚙️ 引擎配置</h2><button class="md-x" onclick="closeM('set')">×</button></div><div class="md-b"><div class="tabs" id="engTabs"></div><button class="btn btn-s" onclick="addEng()" style="margin-bottom:10px">➕ 新增引擎</button><div id="engForm"></div></div></div></div>
<div class="mo" id="mo-cs"><div class="md"><div class="md-h"><h2>🎛️ 会话设置</h2><button class="md-x" onclick="closeM('cs')">×</button></div><div class="md-b"><div class="fg"><label>🎭 System Prompt</label><textarea id="spIn" rows="5" placeholder="设定此会话的全局人设..." onchange="updSP(this.value)"></textarea></div><div class="fg"><label>📚 全局知识库文件</label><input type="file" id="kbIn" accept=".txt,.md,.py,.json,.csv,.log,.pdf,.docx,.png,.jpg,.jpeg,.gif,.webp,.xml,.yaml,.yml,.toml,.ini,.conf,.html,.htm,.css,.js,.ts,.jsx,.tsx,.java,.c,.cpp,.go,.rs,.rb,.php,.swift,.kt,.sql,.sh,.bat" onchange="addKB(this)"><div id="kbList" style="margin-top:8px"></div></div></div></div></div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')"><img id="lbImg" src=""></div>

<!-- Toast -->
<div class="tc" id="tc"></div>
<script>
const SK='zenmux_v3',RW=50;
if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ===== Markdown-it 初始化（含全部插件）=====
var mdit=window.markdownit({html:false,breaks:true,linkify:true,typographer:true,highlight:function(code,lang){
    try{if(lang&&hljs.getLanguage(lang))return hljs.highlight(code,{language:lang}).value;return hljs.highlightAuto(code).value}catch(e){return code}
}});
// 加载插件（安全检查）
if(window.markdownitSub)mdit.use(window.markdownitSub);
if(window.markdownitSup)mdit.use(window.markdownitSup);
if(window.markdownitMark)mdit.use(window.markdownitMark);
if(window.markdownitFootnote)mdit.use(window.markdownitFootnote);
if(window.markdownitTaskLists)mdit.use(window.markdownitTaskLists);
if(window.markdownitEmoji)mdit.use(window.markdownitEmoji);

// Mermaid 初始化
if(window.mermaid)mermaid.initialize({startOnLoad:false,theme:'default'});

const DP={name:'默认引擎',base_url:'',api_key:'',model:'gpt-4o',use_temperature:true,temperature:0.8,use_max_tokens:true,max_tokens:4096,use_top_p:false,top_p:1.0,use_frequency_penalty:false,frequency_penalty:0.0};
let S={profiles:[{...DP}],activeProfileIdx:0,chats:{},currentChatId:null,theme:'light'};
let abC=null,stm=false,rOff=0,pFile=null;

// ===== 同域代理 =====
function apiF(path,opts={}){
    const p=S.profiles[S.activeProfileIdx]||S.profiles[0];
    const base=(p.base_url||'https://api.openai.com/v1').replace(/\/+$/,'');
    const h=new Headers(opts.headers||{});
    h.set('X-Target-Base',base);
    if(!h.has('Authorization'))h.set('Authorization','Bearer '+p.api_key);
    if(!h.has('Content-Type')&&opts.body)h.set('Content-Type','application/json');
    return fetch('/api/'+path,{...opts,headers:h});
}

// ===== 持久化 =====
function gId(){return crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2)}
function load(){
    try{const r=localStorage.getItem(SK);if(r)Object.assign(S,JSON.parse(r))}catch(e){}
    if(!Object.keys(S.chats).length)newChat(false);
    if(!S.currentChatId||!S.chats[S.currentChatId])S.currentChatId=Object.keys(S.chats)[0];
    if(S.activeProfileIdx>=S.profiles.length)S.activeProfileIdx=0;
    Object.values(S.chats).forEach(c=>{
        if(!c.session_knowledge)c.session_knowledge=[];
        if(c.is_pinned===undefined)c.is_pinned=false;
        if(c.is_archived===undefined)c.is_archived=false;
        if(!c.system_prompt)c.system_prompt='';
        if(!c.messages)c.messages=[];
    });
    applyTheme();
}
function save(){try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){}}

// ===== 主题 =====
function togTheme(){S.theme=S.theme==='dark'?'light':'dark';save();applyTheme()}
function applyTheme(){
    document.documentElement.setAttribute('data-theme',S.theme||'light');
    var btn=document.getElementById('themeBtn');
    if(btn)btn.textContent=S.theme==='dark'?'☀️':'🌙';
    // Mermaid 主题同步
    if(window.mermaid)mermaid.initialize({startOnLoad:false,theme:S.theme==='dark'?'dark':'default'});
}

// ===== 文件解析 =====
async function parseF(f){
    const n=f.name.toLowerCase();
    if(n.endsWith('.pdf'))return await pPDF(f);
    if(n.endsWith('.docx'))return await pDOCX(f);
    if(/\.(png|jpg|jpeg|gif|webp)$/.test(n))return await pImg(f);
    return await rTxt(f);
}
function rTxt(f){return new Promise((r,j)=>{const x=new FileReader();x.onload=()=>r(x.result);x.onerror=()=>j(x.error);x.readAsText(f)})}
async function pPDF(f){try{const b=await f.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:b}).promise;let t='';for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const c=await pg.getTextContent();t+=c.items.map(x=>x.str).join(' ')+'\n'}return t}catch(e){return'[PDF错误:'+e.message+']'}}
async function pDOCX(f){try{const b=await f.arrayBuffer();return(await mammoth.extractRawText({arrayBuffer:b})).value}catch(e){return'[DOCX错误:'+e.message+']'}}
function pImg(f){return new Promise((r,j)=>{const x=new FileReader();x.onload=()=>r(x.result);x.onerror=()=>j(x.error);x.readAsDataURL(f)})}

// ===== Markdown 渲染（含数学公式、Mermaid、代码块增强）=====
var mermaidId=0;
function rMD(t){
    try{
        if(!t)return'';
        // 保护数学公式
        var mathBlocks=[];
        t=t.replace(/\$\$([\s\S]*?)\$\$/g,function(m,f){var i=mathBlocks.length;mathBlocks.push({f:f.trim(),d:true});return'%%MBLK_'+i+'%%'});
        t=t.replace(/(?<!\$)\$(?!\$)([^\n$]+?)\$(?!\$)/g,function(m,f){var i=mathBlocks.length;mathBlocks.push({f:f.trim(),d:false});return'%%MINL_'+i+'%%'});
        // 保护 Mermaid
        var mermaidBlocks=[];
        t=t.replace(/```mermaid\s*\n([\s\S]*?)```/g,function(m,c){var i=mermaidBlocks.length;mermaidBlocks.push(c.trim());return'%%MERM_'+i+'%%'});
        // markdown-it 渲染
        var html=mdit.render(t);
        // DOMPurify 安全过滤
        if(window.DOMPurify)html=DOMPurify.sanitize(html,{ADD_TAGS:['input'],ADD_ATTR:['checked','disabled','type']});
        // 还原数学公式
        html=html.replace(/%%MBLK_(\d+)%%/g,function(m,i){
            var mb=mathBlocks[parseInt(i)];
            try{return'<div class="katex-display">'+katex.renderToString(mb.f,{displayMode:true,throwOnError:false})+'</div>'}
            catch(e){return'<pre>'+esc(mb.f)+'</pre>'}
        });
        html=html.replace(/%%MINL_(\d+)%%/g,function(m,i){
            var mb=mathBlocks[parseInt(i)];
            try{return katex.renderToString(mb.f,{displayMode:false,throwOnError:false})}
            catch(e){return'<code>'+esc(mb.f)+'</code>'}
        });
        // 还原 Mermaid
        html=html.replace(/%%MERM_(\d+)%%/g,function(m,i){
            var mid='mermaid_'+(mermaidId++);
            return'<div class="mermaid-wrap"><pre class="mermaid" id="'+mid+'">'+esc(mermaidBlocks[parseInt(i)])+'</pre></div>';
        });
        // 增强代码块（语言标签 + 复制按钮 + 折叠）
        html=html.replace(/<pre><code class="language-(\w+)">([\s\S]*?)<\/code><\/pre>/g,function(m,lang,code){
            var lines=code.split('\n').length;
            var collapsed=lines>20;
            var cls=collapsed?'code-wrap code-collapsed':'code-wrap';
            return'<div class="'+cls+'" data-code="'+btoa(unescape(encodeURIComponent(code.replace(/<[^>]*>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&'))))+'">'+
                '<span class="code-lang">'+lang+'</span>'+
                '<button class="code-copy-top" onclick="cpCode(this)">📋 复制</button>'+
                '<pre><code class="language-'+lang+'">'+code+'</code></pre>'+
                (collapsed?'<div class="code-toggle"><button onclick="togCode(this)">展开全部 ('+lines+'行)</button></div>':'')+
                '<div class="code-copy-bottom"><button onclick="cpCode(this)">📋 复制代码</button></div>'+
                '</div>';
        });
        // 无语言标记的代码块也加复制
        html=html.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g,function(m,code){
            var lines=code.split('\n').length;
            var collapsed=lines>20;
            var cls=collapsed?'code-wrap code-collapsed':'code-wrap';
            return'<div class="'+cls+'" data-code="'+btoa(unescape(encodeURIComponent(code.replace(/<[^>]*>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&'))))+'">'+
                '<button class="code-copy-top" onclick="cpCode(this)">📋 复制</button>'+
                '<pre><code>'+code+'</code></pre>'+
                (collapsed?'<div class="code-toggle"><button onclick="togCode(this)">展开全部 ('+lines+'行)</button></div>':'')+
                '<div class="code-copy-bottom"><button onclick="cpCode(this)">📋 复制代码</button></div>'+
                '</div>';
        });
        // 图片可点击放大
        html=html.replace(/<img ([^>]*)>/g,'<img $1 onclick="openLB(this.src)">');
        // 链接新标签页打开
        html=html.replace(/<a /g,'<a target="_blank" rel="noopener" ');
        return html;
    }catch(e){
        return'<p style="white-space:pre-wrap;margin:0">'+esc(t)+'</p>';
    }
}

// 代码块复制
function cpCode(btn){
    var wrap=btn.closest('.code-wrap');
    if(!wrap)return;
    var b64=wrap.getAttribute('data-code');
    try{
        var code=decodeURIComponent(escape(atob(b64)));
        navigator.clipboard.writeText(code).then(()=>{btn.textContent='✅ 已复制';setTimeout(()=>{btn.textContent='📋 复制';if(btn.classList.contains('code-copy-top'))btn.textContent='📋 复制';else btn.textContent='📋 复制代码'},1500)});
    }catch(e){toast('复制失败','er')}
}

// 代码块折叠/展开
function togCode(btn){
    var wrap=btn.closest('.code-wrap');
    if(!wrap)return;
    wrap.classList.toggle('code-collapsed');
    btn.textContent=wrap.classList.contains('code-collapsed')?'展开全部':'收起';
}

// 图片灯箱
function openLB(src){
    var lb=document.getElementById('lightbox');
    document.getElementById('lbImg').src=src;
    lb.classList.add('show');
}

// ===== 渲染 =====
function render(){renderSB();renderMs();renderBdg();updPin()}
function renderBdg(){const p=S.profiles[S.activeProfileIdx]||S.profiles[0];document.getElementById('badge').innerHTML=`🟢 <strong>${esc(p.name)}</strong> | 🧠 ${esc(p.model)}`}
function updPin(){const c=S.chats[S.currentChatId];document.getElementById('pinBtn').style.opacity=c&&c.is_pinned?'1':'0.5'}

function renderSB(){
    const q=(document.getElementById('schIn')?.value||'').toLowerCase();
    const es=Object.entries(S.chats);
    const pin=es.filter(([,c])=>c.is_pinned&&!c.is_archived&&(!q||c.title.toLowerCase().includes(q)));
    const nor=es.filter(([,c])=>!c.is_pinned&&!c.is_archived&&(!q||c.title.toLowerCase().includes(q)));
    const arc=es.filter(([,c])=>c.is_archived&&(!q||c.title.toLowerCase().includes(q)));
    document.getElementById('pinLbl').style.display=pin.length?'':'none';
    document.getElementById('pinList').innerHTML=pin.map(([id,c])=>ciH(id,c)).join('');
    document.getElementById('chatList').innerHTML=nor.map(([id,c])=>ciH(id,c)).join('');
    document.getElementById('arcLbl').style.display=arc.length?'':'none';
    document.getElementById('arcList').innerHTML=arc.map(([id,c])=>`<li class="ci" style="opacity:.6"><span class="ct">📦 ${esc(c.title)}</span><div class="ia" style="display:flex"><button onclick="event.stopPropagation();unarc('${id}')">♻️</button><button onclick="event.stopPropagation();delC('${id}')">×</button></div></li>`).join('');
}
function ciH(id,c){return`<li class="ci ${id===S.currentChatId?'act':''}" onclick="swC('${id}')">${c.is_pinned?'<span style="font-size:10px">📌</span>':''}<span class="ct">${esc(c.title)}</span><div class="ia"><button onclick="event.stopPropagation();delC('${id}')">×</button></div></li>`}

function renderMs(){
    const a=document.getElementById('msgsArea');const c=S.chats[S.currentChatId];if(!c)return;
    document.getElementById('titleIn').value=c.title;
    const ms=c.messages.filter(m=>m.role!=='system');
    if(!ms.length){a.innerHTML='<div class="empty"><div class="ico">🐙</div><p>开始新的对话吧</p></div>';return}
    const tot=ms.length,st=Math.max(0,tot-RW-rOff),vis=ms.slice(st);
    let h='';
    if(st>0)h+=`<div class="lm"><button onclick="rOff+=${RW};renderMs()">📜 加载更早 (剩${st}条)</button></div>`;
    vis.forEach((msg,vi)=>{
        const ri=st+vi,isU=msg.role==='user',wc=cntW(msg.content);
        const tk=Math.round(wc*1.5);
        const time=msg._time?'<span class="msg-time">'+msg._time+'</span>':'';
        let fh='';if(msg.files&&msg.files.length)fh='<div class="mf">'+msg.files.map(f=>`<span class="fb">${f.continuous?'🔄':'1️⃣'} ${esc(f.filename)}</span>`).join('')+'</div>';
        const bub=isU?esc(msg.content):rMD(msg.content);
        h+=`<div class="msg ${msg.role}"><div class="av">${isU?'🙋‍♂️':'🤖'}</div><div class="mb">${fh}<div class="bub">${bub}</div><div class="mm">${time}<span>${wc}字 ≈${tk}tk</span><button onclick="cpM(${ri})">📋</button>${isU?`<button onclick="edM(${ri})">✏️</button>`:`<button onclick="rgM(${ri})">🔄</button><button onclick="cpFull(${ri})">📋全文</button>`}${!isU&&msg._is_half?`<button onclick="rsM(${ri})">▶️</button>`:''}<button onclick="dlM(${ri})">🗑️</button></div></div></div>`;
    });
    a.innerHTML=h;
    a.scrollTop=a.scrollHeight;
    // 渲染 Mermaid 图表
    if(window.mermaid){try{mermaid.run({querySelector:'.mermaid'})}catch(e){}}
}

// ===== Chat 操作 =====
function newChat(r=true){const id=gId();S.chats[id]={title:'新对话',messages:[],session_knowledge:[],system_prompt:'',is_pinned:false,is_archived:false};S.currentChatId=id;rOff=0;save();if(r){render();closeSB()}}
function swC(id){S.currentChatId=id;rOff=0;save();render();closeSB()}
function delC(id){if(!confirm('删除此对话？'))return;delete S.chats[id];if(S.currentChatId===id){const k=Object.keys(S.chats);S.currentChatId=k[0]||null;if(!S.currentChatId)newChat(false)}save();render()}
function clrC(){if(!confirm('清空所有消息？'))return;const c=S.chats[S.currentChatId];if(c){c.messages=[];rOff=0;save();renderMs()}}
function updTitle(v){const c=S.chats[S.currentChatId];if(c&&v.trim()){c.title=v.trim();save();renderSB()}}
function pinC(){const c=S.chats[S.currentChatId];if(c){c.is_pinned=!c.is_pinned;save();render()}}
function arcC(){const c=S.chats[S.currentChatId];if(c){c.is_archived=true;save();render();toast('已归档')}}
function unarc(id){const c=S.chats[id];if(c){c.is_archived=false;save();render();toast('已恢复')}}

// ===== 消息操作 =====
function dlM(i){const c=S.chats[S.currentChatId];const ms=c.messages.filter(m=>m.role!=='system');const r=c.messages.indexOf(ms[i]);if(r>=0){c.messages.splice(r,1);save();renderMs()}}
function edM(i){const c=S.chats[S.currentChatId];const ms=c.messages.filter(m=>m.role!=='system');const msg=ms[i];const t=prompt('编辑消息:',msg.content);if(t!==null&&t.trim()){const r=c.messages.indexOf(msg);msg.content=t.trim();c.messages=c.messages.slice(0,r+1);save();renderMs();doAPI()}}
function rgM(i){const c=S.chats[S.currentChatId];const ms=c.messages.filter(m=>m.role!=='system');const r=c.messages.indexOf(ms[i]);if(r>=0){c.messages=c.messages.slice(0,r);save();renderMs();doAPI()}}
function rsM(i){const c=S.chats[S.currentChatId];const ms=c.messages.filter(m=>m.role!=='system');ms[i]._is_half=false;c.messages.push({role:'user',content:'请紧接上文继续往下写，保持文风一致。',_time:nowTime()});save();renderMs();doAPI()}
function cpM(i){const c=S.chats[S.currentChatId];const ms=c.messages.filter(m=>m.role!=='system');if(ms[i])navigator.clipboard.writeText(ms[i].content).then(()=>toast('已复制')).catch(()=>toast('复制失败','er'))}
function cpFull(i){cpM(i)}

// ===== 附件 =====
function togAtt(){document.getElementById('attPan').classList.toggle('show')}
async function onAtt(input){const f=input.files[0];if(!f)return;try{const content=await parseF(f);pFile={filename:f.name,content,continuous:document.getElementById('attCont').checked};document.getElementById('attInfo').style.display='block';document.getElementById('attInfo').textContent='✅ '+f.name+' ('+cntW(content)+'字)';document.getElementById('attBtn').classList.add('has');toast('已选: '+f.name)}catch(e){toast('解析失败','er')}}
function clrAtt(){pFile=null;document.getElementById('attInfo').style.display='none';document.getElementById('attIn').value='';document.getElementById('attBtn').classList.remove('has');document.getElementById('attCont').checked=false}

// ===== SP & KB =====
function updSP(v){const c=S.chats[S.currentChatId];if(c){c.system_prompt=v;save()}}
async function addKB(input){const f=input.files[0];if(!f)return;const c=S.chats[S.currentChatId];if(!c)return;if(!c.session_knowledge)c.session_knowledge=[];if(c.session_knowledge.some(k=>k.filename===f.name)){toast('已存在','er');input.value='';return}try{const content=await parseF(f);c.session_knowledge.push({filename:f.name,content});save();rKB();toast('已添加: '+f.name)}catch(e){toast('解析失败','er')}input.value=''}
function rmKB(i){const c=S.chats[S.currentChatId];if(c&&c.session_knowledge){c.session_knowledge.splice(i,1);save();rKB()}}
function rKB(){const c=S.chats[S.currentChatId];const el=document.getElementById('kbList');if(!el||!c)return;if(!c.session_knowledge||!c.session_knowledge.length){el.innerHTML='<span style="font-size:11px;color:var(--text2)">暂无</span>';return}el.innerHTML=c.session_knowledge.map((k,i)=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0"><span style="font-size:11px">📄 ${esc(k.filename)} (${cntW(k.content)}字)</span><button class="btn btn-s btn-d" onclick="rmKB(${i})">×</button></div>`).join('')}
function updCSUI(){const c=S.chats[S.currentChatId];if(!c)return;document.getElementById('spIn').value=c.system_prompt||'';rKB()}

// ===== 时间戳 =====
function nowTime(){var d=new Date();return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)}
// ===== 发送 =====
function send(){
    const input=document.getElementById('uIn');const text=input.value.trim();
    if(!text||stm)return;const c=S.chats[S.currentChatId];if(!c)return;
    const p=S.profiles[S.activeProfileIdx]||S.profiles[0];
    if(!p.api_key){toast('请先配置 API Key','er');return}
    if(!c.messages.length&&c.title==='新对话'){c.title=text.slice(0,12)+(text.length>12?'...':'');document.getElementById('titleIn').value=c.title}
    const msg={role:'user',content:text,_time:nowTime()};
    if(pFile){msg.files=[{...pFile}];clrAtt()}
    c.messages.push(msg);input.value='';aRsz(input);
    document.getElementById('attPan').classList.remove('show');
    save();renderMs();renderSB();doAPI();
}

async function doAPI(){
    const c=S.chats[S.currentChatId];if(!c)return;
    const p=S.profiles[S.activeProfileIdx]||S.profiles[0];
    const apiMsgs=[];
    if(c.system_prompt&&c.system_prompt.trim())apiMsgs.push({role:'system',content:c.system_prompt.trim()});
    if(c.session_knowledge&&c.session_knowledge.length){const kb=c.session_knowledge.map(k=>`--- ${k.filename} ---\n${k.content}`).join('\n\n');apiMsgs.push({role:'system',content:'【全局参考】：\n'+kb})}
    c.messages.forEach((m,i)=>{
        if(m.role==='system')return;
        let ct=m.content;
        let imgFiles=[];
        let txtFiles=[];
        if(m.files&&m.files.length){
            m.files.filter(f=>f.continuous||i===c.messages.length-1).forEach(f=>{
                if(f.content&&f.content.startsWith('data:image')){imgFiles.push(f)}
                else{txtFiles.push(f)}
            });
            if(txtFiles.length){const ft=txtFiles.map(f=>`--- ${f.filename} ---\n${f.content}`).join('\n');ct='【附件】\n'+ft+'\n\n【指令】\n'+ct}
        }
        if(imgFiles.length){
            const parts=[{type:'text',text:ct}];
            imgFiles.forEach(f=>{parts.push({type:'image_url',image_url:{url:f.content,detail:'auto'}})});
            apiMsgs.push({role:m.role,content:parts});
        }else{
            apiMsgs.push({role:m.role,content:ct});
        }
    });

    const params={model:p.model,messages:apiMsgs,stream:true};
    if(p.use_temperature)params.temperature=p.temperature;
    if(p.use_max_tokens)params.max_tokens=p.max_tokens;
    if(p.use_top_p)params.top_p=p.top_p;
    if(p.use_frequency_penalty)params.frequency_penalty=p.frequency_penalty;

    stm=true;const btn=document.getElementById('sendBtn');btn.innerHTML='⏹';btn.className='send stop';btn.onclick=stopG;
    const area=document.getElementById('msgsArea');
    const div=document.createElement('div');div.className='msg assistant';
    div.innerHTML='<div class="av">🤖</div><div class="mb"><div class="bub">思考中...</div></div>';
    area.appendChild(div);area.scrollTop=area.scrollHeight;

    let full='',stopped=false;
    abC=new AbortController();

    try{
        const resp=await apiF('chat/completions',{method:'POST',body:JSON.stringify(params),signal:abC.signal});
        if(!resp.ok)throw new Error('HTTP '+resp.status+': '+(await resp.text()).slice(0,200));
        const reader=resp.body.getReader();const dec=new TextDecoder();const bub=div.querySelector('.bub');
        while(true){const{done,value}=await reader.read();if(done)break;const chunk=dec.decode(value,{stream:true});for(const line of chunk.split('\n')){if(!line.startsWith('data: '))continue;const d=line.slice(6).trim();if(d==='[DONE]')break;try{const delta=JSON.parse(d).choices?.[0]?.delta?.content;if(delta){full+=delta;bub.innerHTML=rMD(full)+'<span style="opacity:.4">▌</span>';area.scrollTop=area.scrollHeight}}catch(e){}}}
    }catch(e){if(e.name==='AbortError')stopped=true;else{toast('失败: '+e.message,'er');if(!full){div.remove();rstBtn();return}stopped=true}}

    if(full){c.messages.push({role:'assistant',content:full,_is_half:stopped,_time:nowTime()});save()}
    rstBtn();renderMs();
}
function stopG(){if(abC){abC.abort();abC=null}}
function rstBtn(){stm=false;const b=document.getElementById('sendBtn');b.innerHTML='➤';b.className='send';b.onclick=send}

// ===== 引擎配置 =====
function rEngF(){
    document.getElementById('engTabs').innerHTML=S.profiles.map((p,i)=>`<button class="tab ${i===S.activeProfileIdx?'act':''}" onclick="swEng(${i})">${esc(p.name)}</button>`).join('');
    const p=S.profiles[S.activeProfileIdx];
    document.getElementById('engForm').innerHTML=`
        <div class="fg"><label>引擎标签</label><input value="${esc(p.name)}" onchange="uEng('name',this.value)"></div>
        <div class="fg"><label>Base URL</label><input value="${esc(p.base_url)}" placeholder="https://api.openai.com/v1" onchange="uEng('base_url',this.value)"></div>
        <div class="fg"><label>API Key</label><input type="password" value="${esc(p.api_key)}" onchange="uEng('api_key',this.value)"><span style="font-size:10px;color:var(--text2)">🔒 仅存浏览器本地</span></div>
        <div class="fr"><div class="fg"><label>模型 ID</label><input id="mdlIn" value="${esc(p.model)}" onchange="uEng('model',this.value)"></div><div class="fg" style="flex:0 0 auto;display:flex;align-items:flex-end"><button class="btn btn-s" onclick="fMdls()">🔄 获取</button></div></div>
        <div id="mdlBox"></div>
        <h4 style="margin:12px 0 6px;font-size:13px">🎛️ 运行时参数</h4>
        <div class="pt"><input type="checkbox" ${p.use_temperature?'checked':''} onchange="uEng('use_temperature',this.checked);rEngF()"><label>🔥 Temperature</label></div>
        ${p.use_temperature?`<div class="ps"><input type="range" min="0" max="2" step="0.1" value="${p.temperature}" oninput="this.nextElementSibling.textContent=this.value;uEng('temperature',+this.value)"><span class="pv">${p.temperature}</span></div>`:''}
        <div class="pt"><input type="checkbox" ${p.use_max_tokens?'checked':''} onchange="uEng('use_max_tokens',this.checked);rEngF()"><label>📏 Max Tokens</label></div>
        ${p.use_max_tokens?`<div class="ps"><input type="number" style="width:110px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg);color:var(--text)" value="${p.max_tokens}" min="1" max="2000000" onchange="uEng('max_tokens',+this.value)"><div class="presets"><button onclick="sMT(4096)">4K</button><button onclick="sMT(8192)">8K</button><button onclick="sMT(16384)">16K</button><button onclick="sMT(32768)">32K</button><button onclick="sMT(65536)">64K</button><button onclick="sMT(131072)">128K</button><button onclick="sMT(1048576)">1M</button><button onclick="sMT(2000000)">2M</button></div></div>`:''}
        <div class="pt"><input type="checkbox" ${p.use_top_p?'checked':''} onchange="uEng('use_top_p',this.checked);rEngF()"><label>🎲 Top P</label></div>
        ${p.use_top_p?`<div class="ps"><input type="range" min="0" max="1" step="0.05" value="${p.top_p}" oninput="this.nextElementSibling.textContent=this.value;uEng('top_p',+this.value)"><span class="pv">${p.top_p}</span></div>`:''}
        <div class="pt"><input type="checkbox" ${p.use_frequency_penalty?'checked':''} onchange="uEng('use_frequency_penalty',this.checked);rEngF()"><label>🚫 Frequency Penalty</label></div>
        ${p.use_frequency_penalty?`<div class="ps"><input type="range" min="-2" max="2" step="0.1" value="${p.frequency_penalty}" oninput="this.nextElementSibling.textContent=this.value;uEng('frequency_penalty',+this.value)"><span class="pv">${p.frequency_penalty}</span></div>`:''}
        <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-s btn-p" onclick="saveEng()">💾 保存配置</button>
            <button class="btn btn-s" onclick="tConn()">🔑 测试连通</button>
            ${S.profiles.length>1?'<button class="btn btn-s btn-d" onclick="dEng()">🗑️ 删除</button>':''}
        </div>`;
}
function swEng(i){S.activeProfileIdx=i;save();rEngF();renderBdg()}
function uEng(k,v){S.profiles[S.activeProfileIdx][k]=v;save();renderBdg()}
function addEng(){S.profiles.push({...DP,name:'引擎'+(S.profiles.length+1)});S.activeProfileIdx=S.profiles.length-1;save();rEngF()}
function dEng(){if(S.profiles.length<=1||!confirm('确定删除？'))return;S.profiles.splice(S.activeProfileIdx,1);S.activeProfileIdx=0;save();rEngF();renderBdg()}
function sMT(v){uEng('max_tokens',v);rEngF()}
function saveEng(){save();toast('✅ 配置已保存')}

async function fMdls(){
    const p=S.profiles[S.activeProfileIdx];if(!p.api_key){toast('请先填写 API Key','er');return}
    const box=document.getElementById('mdlBox');box.innerHTML='<span style="font-size:11px">获取中...</span>';
    try{
        const r=await apiF('models');
        if(!r.ok)throw new Error('HTTP '+r.status);
        const data=await r.json();const models=(data.data||[]).map(m=>m.id).sort();
        if(!models.length){box.innerHTML='<span style="font-size:11px">未获取到模型</span>';return}
        box.innerHTML=`<div class="fg"><label>选择模型 (${models.length}个)</label><select onchange="if(this.value){uEng('model',this.value);document.getElementById('mdlIn').value=this.value;this.closest('.fg').remove();toast('已切换: '+this.value)}"><option value="">(不覆盖)</option>${models.map(m=>`<option value="${esc(m)}">${esc(m)}</option>`).join('')}</select></div>`;
        toast('获取到 '+models.length+' 个模型');
    }catch(e){box.innerHTML=`<span style="font-size:11px;color:var(--err)">失败: ${esc(e.message)}</span>`}
}

async function tConn(){
    const p=S.profiles[S.activeProfileIdx];if(!p.api_key){toast('请先填写 API Key','er');return}
    toast('测试中...');
    try{
        const r=await apiF('chat/completions',{method:'POST',body:JSON.stringify({model:p.model,messages:[{role:'user',content:'Hi'}],max_tokens:5})});
        toast(r.ok?'✅ 连通成功！':'❌ HTTP '+r.status,r.ok?'ok':'er');
    }catch(e){toast('❌ '+e.message,'er')}
}

// ===== 导出 =====
function updExp(){const c=S.chats[S.currentChatId];if(!c)return;const f=document.getElementById('expFmt').value;const ms=c.messages.filter(m=>m.role!=='system');let t;if(f==='pure')t=ms.filter(m=>m.role==='assistant').map(m=>m.content).join('\n\n');else t=ms.map(m=>`${m.role==='user'?'我':'AI'}:\n${m.content}\n${'─'.repeat(30)}\n`).join('\n');document.getElementById('expTA').value=t}
function eTxt(){const t=document.getElementById('expTA').value;const c=S.chats[S.currentChatId];dl(t,(c?.title||'export')+'.txt','text/plain')}
function eHtml(){const c=S.chats[S.currentChatId];const p=S.profiles[S.activeProfileIdx];const f=document.getElementById('expFmt').value;const ms=f==='pure'?c.messages.filter(m=>m.role==='assistant'):c.messages.filter(m=>m.role!=='system');dl(bExpH(ms,c.title,p.model),(c?.title||'export')+'.html','text/html')}
function eDoc(){const c=S.chats[S.currentChatId];const f=document.getElementById('expFmt').value;const ms=f==='pure'?c.messages.filter(m=>m.role==='assistant'):c.messages.filter(m=>m.role!=='system');const body=ms.map(m=>`<h3>${m.role==='user'?'📌 我':'🤖 AI'}</h3><p style="white-space:pre-wrap">${esc(m.content)}</p><hr>`).join('');dl(`<html xmlns:o="urn:schemas-microsoft-com:office:office"><head><meta charset="utf-8"><title>${esc(c.title)}</title></head><body><h1>${esc(c.title)}</h1>${body}</body></html>`,(c?.title||'export')+'.doc','application/msword')}
function cpExp(){const ta=document.getElementById('expTA');ta.select();navigator.clipboard.writeText(ta.value).then(()=>toast('已复制')).catch(()=>{document.execCommand('copy');toast('已复制')})}
function bExpH(ms,title,model){const d=new Date().toLocaleString('zh-CN');const mh=ms.map(m=>`<div style="display:flex;gap:10px;margin-bottom:20px;${m.role==='user'?'flex-direction:row-reverse':''}"><div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:${m.role==='user'?'#e3f2fd':'#e8f5e9'}">${m.role==='user'?'🙋‍♂️':'🤖'}</div><div style="max-width:80%;padding:12px 16px;border-radius:14px;line-height:1.7;font-size:14px;white-space:pre-wrap;background:${m.role==='user'?'#d1e7ff':'#fff'};box-shadow:0 1px 2px rgba(0,0,0,.05)">${esc(m.content).replace(/\n/g,'<br>')}</div></div>`).join('');return`<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${esc(title)}</title></head><body style="font-family:-apple-system,sans-serif;background:#f0f2f5;margin:0"><div style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px 24px"><h1 style="font-size:20px;margin:0">💬 ${esc(title)}</h1><div style="font-size:11px;opacity:.75;margin-top:4px">${d} | 🧠 ${esc(model)}</div></div><div style="max-width:900px;margin:0 auto;padding:20px 16px">${mh}</div></body></html>`}

// ===== 快照 =====
function eSnap(){dl(JSON.stringify(S,null,2),'ZenMux_'+new Date().toISOString().slice(0,10)+'.json','application/json');toast('快照已导出')}
function iSnap(input){
    const f=input.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=function(e){
        try{
            const d=JSON.parse(e.target.result);
            if(d.profiles)S.profiles=d.profiles;
            if(d.free_chats&&!d.chats)d.chats=d.free_chats;
            if(d.chats)S.chats=d.chats;
            if(d.activeProfileIdx!==undefined)S.activeProfileIdx=d.activeProfileIdx;
            if(d.active_profile_idx!==undefined)S.activeProfileIdx=d.active_profile_idx;
            Object.values(S.chats).forEach(c=>{
                if(!c.session_knowledge)c.session_knowledge=[];
                if(c.is_pinned===undefined)c.is_pinned=false;
                if(c.is_archived===undefined)c.is_archived=false;
                if(!c.system_prompt)c.system_prompt='';
                if(!c.messages)c.messages=[];
            });
            S.currentChatId=Object.keys(S.chats)[0]||null;
            if(!S.currentChatId)newChat(false);
            save();render();closeM('snap');
            toast('✅ 恢复成功！');
        }catch(err){toast('导入失败: '+err.message,'er')}
    };
    r.readAsText(f);input.value='';
}

// ===== 工具函数 =====
function togSB(){document.getElementById('sb').classList.toggle('open');document.getElementById('sbOv').classList.toggle('show')}
function closeSB(){if(window.innerWidth<=768){document.getElementById('sb').classList.remove('open');document.getElementById('sbOv').classList.remove('show')}}
function openM(n){document.getElementById('mo-'+n).classList.add('show');if(n==='set')rEngF();if(n==='cs')updCSUI();if(n==='exp')updExp();if(n==='snap'&&/iPad|iPhone|iPod/.test(navigator.userAgent))document.getElementById('iosW').style.display='block'}
function closeM(n){document.getElementById('mo-'+n).classList.remove('show')}
function hKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}
function aRsz(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,130)+'px'}
function toast(msg,type='ok'){const c=document.getElementById('tc');const t=document.createElement('div');t.className='tt '+type;t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),2500)}
function dl(c,n,m){const b=new Blob([c],{type:m+';charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=n;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)}
function esc(t){if(!t)return'';const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function cntW(t){if(!t)return 0;return(t.match(/[\u4e00-\u9fff]/g)||[]).length+(t.match(/[a-zA-Z]+/g)||[]).length}

// ===== 键盘快捷键 =====
document.addEventListener('keydown',function(e){
    // Ctrl+N / Cmd+N: 新建对话
    if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();newChat()}
    // Ctrl+/ / Cmd+/: 打开设置
    if((e.ctrlKey||e.metaKey)&&e.key==='/'){e.preventDefault();openM('set')}
    // Ctrl+E / Cmd+E: 导出
    if((e.ctrlKey||e.metaKey)&&e.key==='e'){e.preventDefault();openM('exp')}
    // Ctrl+B / Cmd+B: 切换侧边栏
    if((e.ctrlKey||e.metaKey)&&e.key==='b'){e.preventDefault();togSB()}
    // Escape: 关闭模态框
    if(e.key==='Escape'){document.querySelectorAll('.mo.show').forEach(m=>m.classList.remove('show'));document.getElementById('lightbox').classList.remove('show')}
});

// ===== 事件监听 =====
document.querySelectorAll('.mo').forEach(o=>o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('show')}));
document.addEventListener('click',function(e){if(!e.target.closest('.att-btn')&&!e.target.closest('.att-pan'))document.getElementById('attPan').classList.remove('show')});

// ===== 初始化 =====
load();render();
if(/iPad|iPhone|iPod/.test(navigator.userAgent)){const lr=localStorage.getItem('zm_ios');if(!lr||Date.now()-+lr>3*86400000){setTimeout(()=>toast('💡 iOS建议定期导出快照'),1500);localStorage.setItem('zm_ios',Date.now()+'')}}
</script>
